<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>♜ Chess · Time Control</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--tg-theme-bg-color, #1e130a);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: Georgia, serif;
      color: var(--tg-theme-text-color, #c9a84c);
      padding: 12px;
    }
    h2 { font-size: 1.3rem; letter-spacing: 5px; margin-bottom: 5px; }

    .players-container {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 576px;
      margin-bottom: 8px;
      gap: 10px;
    }
    .player-card {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.3);
      padding: 4px 12px;
      border-radius: 30px;
      border: 1px solid var(--tg-theme-button-color, #4a3010);
      flex: 1;
      cursor: pointer;
    }
    .player-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #5a3c10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #c9a84c;
      overflow: hidden;
    }
    .player-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .player-info {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .player-name {
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }
    .player-color-badge {
      font-size: 0.6rem;
      opacity: 0.8;
    }
    .spectator-badge {
      background: rgba(0,0,0,0.4);
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 0.65rem;
      border: 1px dashed var(--tg-theme-button-color);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Advanced Clock (compact) ── */
    #clocks {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 576px;
      margin-bottom: 6px;
      gap: 8px;
    }

    .clock-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--tg-theme-button-color, #4a3010);
      border-radius: 24px;
      padding: 4px 10px 4px 4px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .clock-svg-ring {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.6));
      transition: filter 0.3s;
    }

    .ring-track {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 6;
    }
    .ring-progress {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.18s linear, stroke 0.4s ease;
      transform-origin: center;
      transform: rotate(-90deg);
    }
    .ring-bg-circle {
      fill: #1a1005;
      stroke: rgba(201,168,76,0.15);
      stroke-width: 1.5;
    }

    .clock-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .clock-digits {
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: #c9a84c;
      letter-spacing: 1px;
      line-height: 1.1;
      transition: color 0.3s;
    }
    .clock-label {
      font-family: Georgia, serif;
      font-size: 0.55rem;
      color: rgba(201,168,76,0.45);
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1;
    }

    /* Active */
    .clock-wrap.active {
      border-color: #64b050;
      box-shadow: 0 0 8px rgba(100,176,80,0.4);
    }
    .clock-wrap.active .clock-digits { color: #e8d06a; }
    .clock-wrap.active .ring-progress { filter: drop-shadow(0 0 3px currentColor); }

    /* Low-time */
    .clock-wrap.low-time { border-color: #e84040; box-shadow: 0 0 8px rgba(232,64,64,0.4); }
    .clock-wrap.low-time .ring-progress { stroke: #e84040 !important; }
    .clock-wrap.low-time .clock-digits  { color: #ff6060 !important; animation: clock-urgent-pulse 0.6s ease-in-out infinite alternate; }

    /* Critical */
    .clock-wrap.critical .clock-digits { animation: clock-critical-pulse 0.3s ease-in-out infinite alternate !important; }

    @keyframes clock-urgent-pulse {
      from { opacity: 1; } to { opacity: 0.4; }
    }
    @keyframes clock-critical-pulse {
      from { opacity: 1; } to { opacity: 0.25; }
    }

    /* Tick flash */
    .clock-wrap.tick-flash .clock-digits { color: #ffffff !important; }

    /* Inactive dimmed */
    .clock-wrap:not(.active):not(.low-time) .clock-digits { color: rgba(201,168,76,0.4); }
    .clock-wrap:not(.active):not(.low-time) .ring-progress { opacity: 0.3; }

    /* ── Game Status Bar ── */
    #game-status-bar {
      width: 100%;
      max-width: 576px;
      margin-bottom: 8px;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      min-height: 42px;
      display: flex;
      align-items: stretch;
    }

    /* Phase pill on left */
    #status-phase {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      font-size: 0.6rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-family: Georgia, serif;
      white-space: nowrap;
      border-right: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.3);
      min-width: 72px;
      color: #f0d080;
      transition: background 0.3s, color 0.3s;
    }

    /* Main message */
    #status-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 5px 12px;
      gap: 2px;
    }
    #status-line1 {
      font-size: 0.78rem;
      letter-spacing: 2px;
      font-family: Georgia, serif;
      font-weight: bold;
      color: #f5e070;
      transition: color 0.3s;
    }
    #status-line2 {
      font-size: 0.6rem;
      letter-spacing: 1.5px;
      color: rgba(240,220,120,0.6);
      font-family: Georgia, serif;
      min-height: 10px;
      transition: color 0.3s;
    }

    /* Turn indicator dot on right */
    #status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      margin: auto 14px auto 0;
      flex-shrink: 0;
      background: transparent;
      transition: background 0.3s, box-shadow 0.3s;
    }

    /* States — phase-waiting */
    #game-status-bar.phase-waiting {
      border-color: rgba(201,168,76,0.25);
    }
    #game-status-bar.phase-waiting #status-phase { color: #f0d080; }
    #game-status-bar.phase-waiting #status-line1 { color: #f0d080; }
    #game-status-bar.phase-waiting #status-line2 { color: rgba(240,208,128,0.55); }

    /* phase-oppturn */
    #game-status-bar.phase-oppturn {
      border-color: rgba(255,255,255,0.12);
    }
    #game-status-bar.phase-oppturn #status-phase { color: #ddd; }
    #game-status-bar.phase-oppturn #status-line1 { color: #eee; }
    #game-status-bar.phase-oppturn #status-line2 { color: rgba(220,220,220,0.55); }
    #game-status-bar.phase-oppturn #status-dot   { background: rgba(220,220,220,0.35); }

    /* phase-myturn — bright green highlight */
    #game-status-bar.phase-myturn {
      border-color: rgba(100,200,80,0.45);
      background: rgba(0,0,0,0.55);
    }
    #game-status-bar.phase-myturn #status-phase {
      color: #7ee870;
      background: rgba(100,200,80,0.12);
    }
    #game-status-bar.phase-myturn #status-line1 { color: #90f078; }
    #game-status-bar.phase-myturn #status-line2 { color: rgba(140,240,120,0.65); }
    #game-status-bar.phase-myturn #status-dot   { background: #64c850; box-shadow: 0 0 7px #4caf50; }

    /* phase-check — bright red */
    #game-status-bar.phase-check {
      border-color: rgba(240,60,60,0.5);
      background: rgba(60,0,0,0.5);
    }
    #game-status-bar.phase-check #status-phase {
      color: #ff7070;
      background: rgba(220,40,40,0.15);
    }
    #game-status-bar.phase-check #status-line1 {
      color: #ff8080;
      animation: status-pulse 0.5s infinite alternate;
    }
    #game-status-bar.phase-check #status-line2 { color: rgba(255,140,140,0.7); }
    #game-status-bar.phase-check #status-dot   {
      background: #f04040;
      box-shadow: 0 0 7px #e84040;
      animation: status-pulse 0.5s infinite alternate;
    }

    /* phase-over */
    #game-status-bar.phase-over {
      border-color: rgba(201,168,76,0.35);
      background: rgba(0,0,0,0.55);
    }
    #game-status-bar.phase-over #status-phase { color: #f0d080; }
    #game-status-bar.phase-over #status-line1 { color: #ffffff; font-size: 0.82rem; }
    #game-status-bar.phase-over #status-line2 { color: rgba(240,208,128,0.65); }

    @keyframes status-pulse { from{opacity:1} to{opacity:0.25} }

    /* keep old #status hidden but present so JS refs don't break */
    #status { display: none; }

    /* ── Confirm Dialog ── */
    #confirm-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(3px);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    #confirm-modal.show { display: flex; }
    .confirm-box {
      background: #1e130a;
      border: 1.5px solid rgba(201,168,76,0.4);
      border-radius: 14px;
      padding: 24px 22px 18px;
      width: min(290px, 88vw);
      text-align: center;
      animation: confirm-pop 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes confirm-pop {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .confirm-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      display: block;
    }
    .confirm-title {
      font-family: Georgia, serif;
      font-size: 0.9rem;
      letter-spacing: 3px;
      color: #fff;
      margin-bottom: 6px;
    }
    .confirm-sub {
      font-family: Georgia, serif;
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      color: rgba(201,168,76,0.55);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .confirm-btns {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .confirm-yes {
      flex: 1;
      font-family: Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 2px;
      padding: 9px 0;
      border-radius: 6px;
      border: 1.5px solid;
      cursor: pointer;
      transition: background 0.18s;
    }
    .confirm-yes.danger {
      background: rgba(200,40,40,0.12);
      border-color: #a04040;
      color: #f0a0a0;
    }
    .confirm-yes.danger:hover { background: rgba(200,40,40,0.28); }
    .confirm-yes.peace {
      background: rgba(100,176,80,0.1);
      border-color: #4a7040;
      color: #a5d6a5;
    }
    .confirm-yes.peace:hover { background: rgba(100,176,80,0.25); }
    .confirm-no {
      flex: 1;
      font-family: Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 2px;
      padding: 9px 0;
      border-radius: 6px;
      border: 1px solid rgba(201,168,76,0.2);
      background: transparent;
      color: rgba(201,168,76,0.55);
      cursor: pointer;
      transition: color 0.18s, border-color 0.18s;
    }
    .confirm-no:hover { color: #c9a84c; border-color: rgba(201,168,76,0.5); }

    #board-wrap {
      border: 3px solid var(--tg-theme-button-color, #5a3c10);
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
      width: 100%;
      max-width: 576px;
      position: relative;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(8, 12.5%);
      width: 100%;
      aspect-ratio: 1;
    }
    .cell {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative;
    }
    .light { background: #f0d9b5; }
    .dark  { background: #b58863; }
    .selected     { background: #64b050 !important; }
    .last-move-hi { background: rgba(140,190,0,0.5) !important; }
    .in-check     { background: rgba(210,20,20,0.7) !important; }
    .cell svg { width: 88%; height: 88%; display: block; }

    .move-dot::after {
      content: '';
      position: absolute;
      width: 22%;
      height: 22%;
      background: #4CAF50;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.85;
      pointer-events: none;
    }
    .capture-highlight {
      box-shadow: inset 0 0 0 3.5px #4CAF50 !important;
    }

    #waiting-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(30,19,10,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      z-index: 10;
      border-radius: inherit;
    }
    .waiting-message {
      text-align: center;
      font-size: 1.2rem;
      letter-spacing: 3px;
      color: #c9a84c;
    }

    /* ── Game Over Overlay ── */
    #gameover-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 6, 2, 0.88);
      backdrop-filter: blur(6px);
      z-index: 20;
      border-radius: inherit;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      animation: go-fade-in 0.45s ease-out;
    }
    #gameover-overlay.show { display: flex; }

    @keyframes go-fade-in {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    #go-emoji {
      font-size: 3.2rem;
      line-height: 1;
      margin-bottom: 10px;
      animation: go-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
    }
    @keyframes go-pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    #go-headline {
      font-family: Georgia, serif;
      font-size: clamp(1.25rem, 5vw, 1.85rem);
      font-weight: bold;
      letter-spacing: 4px;
      color: #fff;
      text-align: center;
      padding: 0 16px;
      text-shadow: 0 0 24px rgba(201,168,76,0.6);
      animation: go-slide-up 0.4s ease-out 0.25s both;
      line-height: 1.2;
    }
    #go-sub {
      font-family: Georgia, serif;
      font-size: 0.72rem;
      letter-spacing: 2.5px;
      color: rgba(201,168,76,0.7);
      text-align: center;
      margin-top: 8px;
      padding: 0 20px;
      animation: go-slide-up 0.4s ease-out 0.35s both;
    }
    @keyframes go-slide-up {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .go-divider {
      width: 48px;
      height: 1px;
      background: rgba(201,168,76,0.35);
      margin: 16px auto;
      animation: go-slide-up 0.4s ease-out 0.4s both;
    }

    #go-exit-btn {
      font-family: Georgia, serif;
      font-size: 0.72rem;
      letter-spacing: 3px;
      padding: 10px 32px;
      background: rgba(201,168,76,0.1);
      color: #c9a84c;
      border: 1.5px solid rgba(201,168,76,0.5);
      border-radius: 4px;
      cursor: pointer;
      animation: go-slide-up 0.4s ease-out 0.5s both;
      transition: background 0.2s, border-color 0.2s;
    }
    #go-exit-btn:hover { background: rgba(201,168,76,0.22); border-color: #c9a84c; }

    #go-new-btn {
      font-family: Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 2px;
      padding: 8px 24px;
      background: transparent;
      color: rgba(201,168,76,0.5);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
      animation: go-slide-up 0.4s ease-out 0.58s both;
      transition: color 0.2s, border-color 0.2s;
    }
    #go-new-btn:hover { color: #c9a84c; border-color: rgba(201,168,76,0.5); }

    #controls {
      margin-top: 12px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center;
    }
    #info {
      font-size: 0.68rem; letter-spacing: 3px; padding: 5px 12px;
      border: 1px solid var(--tg-theme-button-color, #4a3010);
    }
    button {
      font-family: Georgia, serif; font-size: 0.68rem; letter-spacing: 3px; padding: 7px 18px;
      background: transparent; color: var(--tg-theme-text-color, #c9a84c);
      border: 1.5px solid var(--tg-theme-button-color, #4a3010); cursor: pointer;
    }
    button:hover { background: rgba(201,168,76,0.08); }
    #resign-btn {
      background: rgba(200, 40, 40, 0.1);
      border-color: #a04040;
      color: #e0a0a0;
    }
    #draw-btn {
      background: rgba(100,176,80,0.08);
      border-color: #4a7040;
      color: #a5d6a5;
    }
    #draw-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* Draw offer incoming banner */
    #draw-offer-banner {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1005;
      border: 1.5px solid #c9a84c;
      border-radius: 12px;
      padding: 12px 18px;
      text-align: center;
      z-index: 200;
      min-width: 260px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.8);
      animation: banner-pop 0.2s ease-out;
    }
    #draw-offer-banner.show { display: block; }
    @keyframes banner-pop {
      from { opacity: 0; transform: translateX(-50%) scale(0.92); }
      to   { opacity: 1; transform: translateX(-50%) scale(1); }
    }
    #draw-offer-banner p {
      font-size: 0.78rem;
      letter-spacing: 2px;
      color: #c9a84c;
      margin-bottom: 10px;
    }
    .draw-banner-btns { display: flex; gap: 10px; justify-content: center; }
    .draw-accept-btn {
      background: rgba(100,176,80,0.15);
      border: 1.5px solid #64b050;
      color: #a5d6a5;
      font-family: Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 2px;
      padding: 6px 16px;
      cursor: pointer;
      border-radius: 4px;
    }
    .draw-accept-btn:hover { background: rgba(100,176,80,0.3); }
    .draw-decline-btn {
      background: rgba(200,40,40,0.1);
      border: 1.5px solid #a04040;
      color: #e0a0a0;
      font-family: Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 2px;
      padding: 6px 16px;
      cursor: pointer;
      border-radius: 4px;
    }
    .draw-decline-btn:hover { background: rgba(200,40,40,0.25); }

    /* Stats Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-content {
      background: var(--tg-theme-bg-color, #2a1e0f);
      border: 2px solid var(--tg-theme-button-color, #c9a84c);
      border-radius: 16px;
      padding: 20px;
      max-width: 300px;
      width: 90%;
      text-align: center;
    }
    .modal-content h3 { margin-bottom: 15px; }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 15px 0;
    }
    .stat-item {
      background: rgba(0,0,0,0.3);
      padding: 8px;
      border-radius: 8px;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #c9a84c;
    }
    .stat-label {
      font-size: 0.7rem;
      opacity: 0.8;
    }
    .close-btn {
      margin-top: 10px;
      padding: 8px 20px;
      background: var(--tg-theme-button-color, #5a3c10);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Promotion Modal */
    .promo-options {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
    }
    .promo-piece {
      width: 50px;
      height: 50px;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 5px;
      background: rgba(0,0,0,0.2);
    }
    .promo-piece:hover {
      border-color: #c9a84c;
      background: rgba(201,168,76,0.2);
    }

    /* Chat Panel */
    #chat-fab {
      position: fixed; bottom: 22px; right: 18px;
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--tg-theme-button-color, #5a3c10);
      border: 2px solid rgba(201,168,76,0.5);
      color: #c9a84c; font-size: 1.35rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 18px rgba(0,0,0,0.6);
      z-index: 100;
      transition: transform 0.15s;
    }
    #chat-fab:active { transform: scale(0.92); }

    #chat-badge {
      position: absolute; top: -4px; right: -4px;
      background: #e84040; color: #fff;
      font-size: 0.55rem; font-family: Georgia, serif;
      width: 17px; height: 17px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      font-weight: bold;
    }

    #chat-panel {
      position: fixed; bottom: 80px; right: 12px;
      width: min(340px, calc(100vw - 24px));
      background: #1a0f06;
      border: 1.5px solid rgba(201,168,76,0.35);
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
      display: none; flex-direction: column;
      z-index: 99;
      border-radius: 8px;
      overflow: hidden;
    }
    #chat-panel.open { display: flex; }

    #chat-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 12px;
      border-bottom: 1px solid rgba(201,168,76,0.2);
      font-size: 0.63rem; letter-spacing: 3px;
      color: #c9a84c;
    }
    #chat-close {
      background: none; border: none; cursor: pointer;
      color: rgba(201,168,76,0.7); font-size: 1rem; padding: 0 2px;
      line-height: 1;
    }
    #chat-close:hover { color: #c9a84c; }

    #chat-messages {
      height: 200px; overflow-y: auto;
      padding: 8px 10px;
      display: flex; flex-direction: column; gap: 5px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 3px; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); }

    .chat-msg { 
      font-size: 0.7rem; line-height: 1.45; word-break: break-word; 
      color: #ddd;
    }
    .chat-msg .msg-name { 
      font-size: 0.62rem; letter-spacing: 1px; margin-right: 5px; 
      font-weight: bold;
    }
    .chat-msg.white    .msg-name { color: #f0d9b5; }
    .chat-msg.black    .msg-name { color: #b58863; }
    .chat-msg.spectator .msg-name { color: #aaa; }
    .chat-msg.system {
      color: #c9a84c; font-style: italic;
      font-size: 0.63rem; text-align: center;
    }
    .chat-msg .msg-text { color: #eee; }

    #chat-input-row { display: flex; border-top: 1px solid rgba(201,168,76,0.2); }
    #chat-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: Georgia, serif; font-size: 0.72rem;
      color: #eee;
      padding: 9px 10px; letter-spacing: 1px;
    }
    #chat-input::placeholder { color: rgba(201,168,76,0.5); }
    #chat-send {
      border: none; border-left: 1px solid rgba(201,168,76,0.2);
      background: transparent; color: #c9a84c;
      padding: 0 14px; cursor: pointer; font-size: 1rem;
    }
    #chat-send:hover { background: rgba(201,168,76,0.1); }
  </style>
</head>
<body>
<h2>♜ CHESS ♞</h2>

<div class="players-container">
  <div class="player-card" id="white-player-card">
    <div class="player-avatar" id="white-avatar">♔</div>
    <div class="player-info">
      <span class="player-name" id="white-name">White</span>
      <span class="player-color-badge">⚪ White</span>
    </div>
  </div>
  <div class="spectator-badge" id="spectator-count">

  </div>
  <div class="player-card" id="black-player-card">
    <div class="player-avatar" id="black-avatar">♚</div>
    <div class="player-info">
      <span class="player-name" id="black-name">Black</span>
      <span class="player-color-badge">⚫ Black</span>
    </div>
  </div>
</div>

<div id="clocks">
  <!-- White clock -->
  <div class="clock-wrap" id="white-clock-wrap">
    <svg class="clock-svg-ring" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <circle class="ring-bg-circle" cx="18" cy="18" r="16"/>
      <circle class="ring-track" cx="18" cy="18" r="13"/>
      <circle class="ring-progress" id="white-ring" cx="18" cy="18" r="13"
              stroke="#64b050" stroke-dasharray="81.68" stroke-dashoffset="0"/>
    </svg>
    <div class="clock-info">
      <span class="clock-digits" id="white-clock">10:00</span>
      <span class="clock-label">White</span>
    </div>
  </div>

  <!-- Black clock -->
  <div class="clock-wrap" id="black-clock-wrap">
    <svg class="clock-svg-ring" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <circle class="ring-bg-circle" cx="18" cy="18" r="16"/>
      <circle class="ring-track" cx="18" cy="18" r="13"/>
      <circle class="ring-progress" id="black-ring" cx="18" cy="18" r="13"
              stroke="#64b050" stroke-dasharray="81.68" stroke-dashoffset="0"/>
    </svg>
    <div class="clock-info">
      <span class="clock-digits" id="black-clock">10:00</span>
      <span class="clock-label">Black</span>
    </div>
  </div>
</div>

<div id="game-status-bar" class="phase-waiting">
  <div id="status-phase">WAIT</div>
  <div id="status-main">
    <div id="status-line1">CONNECTING...</div>
    <div id="status-line2"></div>
  </div>
  <div id="status-dot"></div>
</div>
<div id="status" style="display:none"></div>

<div id="board-wrap">

  <div id="waiting-overlay" style="display: none;">

  </div>
  <div id="gameover-overlay">

    <div id="go-headline">GAME OVER</div>
    <div id="go-sub"></div>

<div id="controls">

  <button id="draw-btn" onclick="offerDraw()">🤝 DRAW</button>

<!-- Stats Modal -->
<div id="stats-modal" class="modal">

    <h3 id="modal-player-name">Player Stats</h3>

      </div>
      <div class="stat-item">

    <div class="confirm-sub" id="confirm-sub"></div>

<!-- Chat UI -->

  💬
  <span id="chat-badge"></span>
</button>

<div id="chat-panel">

    <button id="chat-close" onclick="toggleChat()">✕</button>

  </div>

    <button id="chat-send" onclick="sendChatMessage()">➤</button>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();

  // --- User ID & Info ---
  const user = tg.initDataUnsafe?.user;
  let userId = user ? user.id.toString() : null;
  if (!userId) {
    let storedId = localStorage.getItem('chess_anon_id');
    if (!storedId) {
      storedId = 'anon_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
      localStorage.setItem('chess_anon_id', storedId);
    }
    userId = storedId;
  }

  function getUserInfo() {
    if (user) {
      return {
        id: user.id,
        firstName: user.first_name,
        lastName: user.last_name,
        username: user.username,
        photoUrl: user.photo_url || null
      };
    }
    return { id: userId, firstName: 'Anonymous', lastName: '', photoUrl: null };
  }
  const userInfo = getUserInfo();

  const startParam = tg.initDataUnsafe?.start_param;
  const urlParams = new URLSearchParams(window.location.search);
  let gameId = startParam || urlParams.get('game');

  async function ensureGameId() {
    if (!gameId) {
      try {
        const res = await fetch('/api/game/new', { method: 'POST' });
        const data = await res.json();
        gameId = data.gameId;
        const url = new URL(window.location);
        url.searchParams.set('game', gameId);
        window.history.replaceState({}, '', url);
      } catch (e) {
        document.getElementById('board').innerHTML = '<div class="error">Could not create game.</div>';
        throw e;
      }
    }
  }

  // --- State ---
  let myColor = null;
  let selectedSquare = null;
  let possibleMoves = [];
  let boardState = null;
  let lastMove = null;
  let updateInterval = null;
  let waitingForOpponent = true;
  let currentTurn = 'w';
  let gameOver = false;
  let whiteUserId = null, blackUserId = null;

  let whiteTime = 600, blackTime = 600;
  let localTimerInterval = null;

  const boardEl = document.getElementById('board');
  const waitingOverlay = document.getElementById('waiting-overlay');

  // Promotion state
  let pendingPromotion = null;
  let promotionResolve = null;

  // --- Stats Modal ---
  function showStatsModal(uid, playerName) {
    if (!uid) return;
    fetch(`/api/user/${uid}/stats`)
      .then(r => r.json())
      .then(data => {
        document.getElementById('modal-player-name').textContent = playerName;
        document.getElementById('stat-games').textContent = data.stats.gamesPlayed;
        document.getElementById('stat-wins').textContent = data.stats.wins;
        document.getElementById('stat-losses').textContent = data.stats.losses;
        document.getElementById('stat-draws').textContent = data.stats.draws;
        document.getElementById('stats-modal').style.display = 'flex';
      })
      .catch(err => console.error('Stats error:', err));
  }

  window.closeStatsModal = function() {
    document.getElementById('stats-modal').style.display = 'none';
  };

  document.getElementById('white-player-card').addEventListener('click', () => {
    if (whiteUserId) showStatsModal(whiteUserId, document.getElementById('white-name').textContent);
  });
  document.getElementById('black-player-card').addEventListener('click', () => {
    if (blackUserId) showStatsModal(blackUserId, document.getElementById('black-name').textContent);
  });

  // --- Player Display Update ---
  function updatePlayerDisplays(data) {
    whiteUserId = data.whiteUserId;
    blackUserId = data.blackUserId;

    const white = data.whitePlayer || { firstName: 'White' };
    document.getElementById('white-name').textContent = white.firstName || 'White';
    const whiteAvatar = document.getElementById('white-avatar');
    whiteAvatar.innerHTML = white.photoUrl ? `<img src="${white.photoUrl}" alt="W">` : (white.firstName?.charAt(0) || 'W');

    const black = data.blackPlayer || { firstName: 'Black' };
    document.getElementById('black-name').textContent = black.firstName || 'Black';
    const blackAvatar = document.getElementById('black-avatar');
    blackAvatar.innerHTML = black.photoUrl ? `<img src="${black.photoUrl}" alt="B">` : (black.firstName?.charAt(0) || 'B');

    document.getElementById('spec-count').textContent = data.spectatorCount || 0;
  }

  function toggleWaitingOverlay(isWaiting) {
    waitingOverlay.style.display = isWaiting ? 'flex' : 'none';
  }

  // Heartbeat
  setInterval(() => {
    if (gameId) {
      fetch(`/api/game/${gameId}/heartbeat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, userInfo })
      }).catch(() => {});
    }
  }, 15000);

  // --- Piece SVG (Improved Knight) ---
  function mkPiece(type, isWhite) {
    const f = isWhite ? '#ffffff' : '#1c1c1c';
    const f2 = isWhite ? '#ddd0b8' : '#333333';
    const sk = isWhite ? '#3a2008' : '#e8d0a0';
    const sw = '1.4';
    const s = {
      P: '<ellipse cx="22.5" cy="9.5" rx="5.2" ry="5.2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<path d="M19.5 14.5 C17 17 16.5 19.5 17.5 21.5 L15 21.5 C13.5 22.5 13.5 24.5 15 25.5 L30 25.5 C31.5 24.5 31.5 22.5 30 21.5 L27.5 21.5 C28.5 19.5 28 17 25.5 14.5 Z" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="11.5" y="25.5" width="22" height="4" rx="2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="9.5" y="29.5" width="26" height="4.5" rx="2.2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>',
      R: '<rect x="9.5" y="9.5" width="5" height="8" rx="1" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="20" y="9.5" width="5" height="8" rx="1" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="30.5" y="9.5" width="5" height="8" rx="1" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="11" y="17" width="23" height="14" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="9.5" y="30.5" width="26" height="4.5" rx="2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="13" y="23" width="4" height="5" rx="1" fill="'+f2+'" stroke="'+sk+'" stroke-width="0.8"/>'+
         '<rect x="20.5" y="23" width="4" height="5" rx="1" fill="'+f2+'" stroke="'+sk+'" stroke-width="0.8"/>'+
         '<rect x="28" y="23" width="4" height="5" rx="1" fill="'+f2+'" stroke="'+sk+'" stroke-width="0.8"/>',
      N: '<rect x="9.5" y="33" width="26" height="4.5" rx="2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<path d="M22.5 5 C26 5 29 8 30 13 C31 18 29 22 26 25 L24 25 C22 23 21 20 21 17 C21 14 22 12 24 11 C21 10 18 12 17 15 C16 18 17 22 19 25 L17 25 C14 22 13 18 14 13 C15 8 18 5 22.5 5 Z" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<path d="M20 8 C18 8 16 10 15 13 C14 16 15 19 17 21" fill="none" stroke="'+sk+'" stroke-width="1.2"/>'+
         '<circle cx="26" cy="11" r="1.5" fill="'+f2+'"/>',
      B: '<circle cx="22.5" cy="7" r="3" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<path d="M22.5 10 C17.5 10 13.5 14.5 13.5 20.5 C13.5 24.5 15.5 27 19 28 L26 28 C29.5 27 31.5 24.5 31.5 20.5 C31.5 14.5 27.5 10 22.5 10 Z" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="14" y="28" width="17" height="3" rx="1.5" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="9.5" y="30.5" width="26" height="4.5" rx="2.2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<line x1="22.5" y1="9.5" x2="22.5" y2="5" stroke="'+sk+'" stroke-width="'+sw+'" stroke-linecap="round"/>'+
         '<ellipse cx="22.5" cy="19" rx="4" ry="5" fill="'+f2+'" stroke="'+sk+'" stroke-width="0.8"/>',
      Q: '<circle cx="9.5" cy="13" r="3" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<circle cx="16.5" cy="10" r="3" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<circle cx="22.5" cy="8.5" r="3.2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<circle cx="28.5" cy="10" r="3" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<circle cx="35.5" cy="13" r="3" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<path d="M9 26 L9.5 16 L16.5 21 L22.5 11.5 L28.5 21 L35.5 16 L36 26 Z" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="10" y="26" width="25" height="3.5" rx="1.5" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="9.5" y="29.5" width="26" height="4.5" rx="2.2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>',
      K: '<rect x="20" y="4.5" width="5" height="13" rx="1.5" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="15" y="8.5" width="15" height="5" rx="1.5" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<path d="M13.5 28.5 C13.5 21 16 18 22.5 18 C29 18 31.5 21 31.5 28.5 Z" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="11" y="28.5" width="23" height="3" rx="1" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'+
         '<rect x="9.5" y="31" width="26" height="4.5" rx="2.2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
    };
    return `<svg viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg">${s[type] || ''}</svg>`;
  }

  // Coordinate helpers
  function internalToDisplay(row, col) {
    if (myColor === 'black') return { row: 7 - row, col: 7 - col };
    return { row, col };
  }
  function displayToInternal(row, col) {
    if (myColor === 'black') return { row: 7 - row, col: 7 - col };
    return { row, col };
  }
  function fenToBoard(fen) {
    const board = Array(8).fill().map(() => Array(8).fill(''));
    const rows = fen.split(' ')[0].split('/');
    for (let i = 0; i < 8; i++) {
      let col = 0;
      for (let ch of rows[i]) {
        if (isNaN(parseInt(ch))) board[i][col++] = ch;
        else col += parseInt(ch);
      }
    }
    return board;
  }
  function coordToAlgebraic(row, col) {
    const files = ['a','b','c','d','e','f','g','h'];
    const ranks = ['8','7','6','5','4','3','2','1'];
    return files[col] + ranks[row];
  }

  // --- Move generation with check validation, castling, and promotion detection ---
  function isWhitePiece(p) { return p && p === p.toUpperCase() && p !== p.toLowerCase(); }
  function isBlackPiece(p) { return p && p === p.toLowerCase() && p !== p.toUpperCase(); }
  function getPieceColor(p) { if (!p) return null; return isWhitePiece(p) ? 'white' : 'black'; }

  function isSquareAttacked(attackingColor, row, col) {
    const pawnDir = attackingColor === 'white' ? 1 : -1;
    for (let [dr, dc] of [[pawnDir, -1], [pawnDir, 1]]) {
      const r = row + dr, c = col + dc;
      if (r>=0 && r<8 && c>=0 && c<8 && boardState[r][c] && boardState[r][c].toUpperCase()==='P' && getPieceColor(boardState[r][c])===attackingColor) return true;
    }
    for (let [dr, dc] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]) {
      const r = row + dr, c = col + dc;
      if (r>=0 && r<8 && c>=0 && c<8 && boardState[r][c] && boardState[r][c].toUpperCase()==='N' && getPieceColor(boardState[r][c])===attackingColor) return true;
    }
    for (let [dr, dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]) {
      let r = row+dr, c = col+dc;
      while (r>=0 && r<8 && c>=0 && c<8) {
        const p = boardState[r][c];
        if (p) {
          if (getPieceColor(p)===attackingColor && (p.toUpperCase()==='B'||p.toUpperCase()==='Q')) return true;
          break;
        }
        r+=dr; c+=dc;
      }
    }
    for (let [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      let r = row+dr, c = col+dc;
      while (r>=0 && r<8 && c>=0 && c<8) {
        const p = boardState[r][c];
        if (p) {
          if (getPieceColor(p)===attackingColor && (p.toUpperCase()==='R'||p.toUpperCase()==='Q')) return true;
          break;
        }
        r+=dr; c+=dc;
      }
    }
    for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) if(dr||dc) {
      const r=row+dr, c=col+dc;
      if (r>=0&&r<8&&c>=0&&c<8&&boardState[r][c]&&boardState[r][c].toUpperCase()==='K'&&getPieceColor(boardState[r][c])===attackingColor) return true;
    }
    return false;
  }

  function isMoveLegal(fromRow, fromCol, toRow, toCol, pieceColor) {
    const boardCopy = boardState.map(r=>[...r]);
    boardCopy[toRow][toCol] = boardCopy[fromRow][fromCol];
    boardCopy[fromRow][fromCol] = '';
    let kingRow=-1, kingCol=-1;
    const kingChar = pieceColor==='white'?'K':'k';
    for (let r=0;r<8;r++) for(let c=0;c<8;c++) if(boardCopy[r][c]===kingChar) { kingRow=r; kingCol=c; break; }
    if (kingRow===-1) return false;
    const original = boardState;
    boardState = boardCopy;
    const attacked = isSquareAttacked(pieceColor==='white'?'black':'white', kingRow, kingCol);
    boardState = original;
    return !attacked;
  }

  function getMovesFromSquare(row, col) {
    const piece = boardState[row][col];
    if (!piece) return [];
    const pieceType = piece.toUpperCase();
    const pieceColor = getPieceColor(piece);
    const pseudo = [];

    function addMoveIfValid(toRow, toCol) {
      if (toRow<0||toRow>7||toCol<0||toCol>7) return false;
      const target = boardState[toRow][toCol];
      if (target) {
        if (getPieceColor(target)===pieceColor) return false;
        pseudo.push({ toRow, toCol, isCapture: true });
        return false;
      } else { pseudo.push({ toRow, toCol, isCapture: false }); return true; }
    }

    if (pieceType==='P') {
      const dir = pieceColor==='white' ? -1 : 1;
      const start = pieceColor==='white' ? 6 : 1;
      const one = row+dir;
      if (one>=0 && one<8 && !boardState[one][col]) {
        pseudo.push({ toRow: one, toCol: col, isCapture: false });
        if (row===start) { const two = row+2*dir; if (!boardState[two][col]) pseudo.push({ toRow: two, toCol: col, isCapture: false }); }
      }
      for (let dc of [-1,1]) {
        const capRow=row+dir, capCol=col+dc;
        if (capRow>=0&&capRow<8&&capCol>=0&&capCol<8) {
          const t=boardState[capRow][capCol];
          if (t && getPieceColor(t)!==pieceColor) pseudo.push({ toRow: capRow, toCol: capCol, isCapture: true });
        }
      }
    } else if (pieceType==='N') {
      for (let [dr,dc] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]) {
        const nr=row+dr, nc=col+dc;
        if (nr>=0&&nr<8&&nc>=0&&nc<8) {
          const t=boardState[nr][nc];
          if (!t) pseudo.push({ toRow: nr, toCol: nc, isCapture: false });
          else if (getPieceColor(t)!==pieceColor) pseudo.push({ toRow: nr, toCol: nc, isCapture: true });
        }
      }
    } else if (pieceType==='B'||pieceType==='R'||pieceType==='Q') {
      const dirs = [];
      if (pieceType!=='R') dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
      if (pieceType!=='B') dirs.push([-1,0],[1,0],[0,-1],[0,1]);
      for (let [dr,dc] of dirs) {
        let r=row+dr, c=col+dc;
        while (r>=0&&r<8&&c>=0&&c<8) {
          const t=boardState[r][c];
          if (!t) { pseudo.push({ toRow: r, toCol: c, isCapture: false }); r+=dr; c+=dc; }
          else { if (getPieceColor(t)!==pieceColor) pseudo.push({ toRow: r, toCol: c, isCapture: true }); break; }
        }
      }
    } else if (pieceType==='K') {
      // Normal moves
      for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) if(dr||dc) {
        const nr=row+dr, nc=col+dc;
        if (nr>=0&&nr<8&&nc>=0&&nc<8) {
          const t=boardState[nr][nc];
          if (!t) pseudo.push({ toRow: nr, toCol: nc, isCapture: false });
          else if (getPieceColor(t)!==pieceColor) pseudo.push({ toRow: nr, toCol: nc, isCapture: true });
        }
      }
      // Castling
      const backRank = pieceColor === 'white' ? 7 : 0;
      if (row === backRank && col === 4) {
        // Kingside
        if (!isSquareAttacked(pieceColor==='white'?'black':'white', row, col) &&
            !isSquareAttacked(pieceColor==='white'?'black':'white', row, 5) &&
            !isSquareAttacked(pieceColor==='white'?'black':'white', row, 6) &&
            !boardState[row][5] && !boardState[row][6] &&
            boardState[row][7] && boardState[row][7].toUpperCase() === 'R' &&
            getPieceColor(boardState[row][7]) === pieceColor) {
          pseudo.push({ toRow: row, toCol: 6, isCapture: false, isCastling: true });
        }
        // Queenside
        if (!isSquareAttacked(pieceColor==='white'?'black':'white', row, col) &&
            !isSquareAttacked(pieceColor==='white'?'black':'white', row, 3) &&
            !isSquareAttacked(pieceColor==='white'?'black':'white', row, 2) &&
            !boardState[row][3] && !boardState[row][2] && !boardState[row][1] &&
            boardState[row][0] && boardState[row][0].toUpperCase() === 'R' &&
            getPieceColor(boardState[row][0]) === pieceColor) {
          pseudo.push({ toRow: row, toCol: 2, isCapture: false, isCastling: true });
        }
      }
    }

    return pseudo.filter(m => isMoveLegal(row, col, m.toRow, m.toCol, pieceColor));
  }

  // ── Advanced Clock System ──────────────────────────────────────────
  // Uses performance.now() for sub-millisecond accuracy.
  // Ring circumference = 2π × 50 ≈ 314.16

  const RING_CIRC = 81.68; // r=13, 2π×13
  let timerRAF = null;
  let timerInitialWhite = 600;
  let timerInitialBlack = 600;
  let lastSecondWhite = -1;
  let lastSecondBlack = -1;

  // Wall-clock anchor: when the current timer segment started and what the time was then.
  // This means server syncs just update the anchor — the RAF loop never resets.
  let timerAnchorTs = null;    // performance.now() value at last anchor set
  let timerAnchorWt = null;    // whiteTime at last anchor
  let timerAnchorBt = null;    // blackTime at last anchor
  let timerAnchorTurn = null;  // whose turn at last anchor

  function formatTime(s) {
    if (s <= 0) return '0:00';
    const mins = Math.floor(s / 60);
    const secs = Math.floor(s % 60);
    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
  }

  function setRingProgress(ringEl, current, total) {
    if (!ringEl) return;
    const ratio = total > 0 ? Math.max(0, Math.min(1, current / total)) : 0;
    ringEl.style.strokeDashoffset = RING_CIRC * (1 - ratio);
    if (ratio > 0.5)       ringEl.style.stroke = '#64b050';
    else if (ratio > 0.25) ringEl.style.stroke = '#c9a84c';
    else if (ratio > 0.1)  ringEl.style.stroke = '#e07020';
    else                   ringEl.style.stroke = '#e84040';
  }

  function tickFlash(wrapId) {
    const el = document.getElementById(wrapId);
    if (!el) return;
    el.classList.add('tick-flash');
    setTimeout(() => el.classList.remove('tick-flash'), 120);
  }

  function updateClockDisplay() {
    const wText = document.getElementById('white-clock');
    const bText = document.getElementById('black-clock');
    const wWrap = document.getElementById('white-clock-wrap');
    const bWrap = document.getElementById('black-clock-wrap');
    const wRing = document.getElementById('white-ring');
    const bRing = document.getElementById('black-ring');

    if (wText) wText.textContent = formatTime(whiteTime);
    if (bText) bText.textContent = formatTime(blackTime);
    // Note: clock-digits are now HTML <span> elements; color is set via CSS classes

    setRingProgress(wRing, whiteTime, timerInitialWhite);
    setRingProgress(bRing, blackTime, timerInitialBlack);

    const wActive = currentTurn === 'w' && !gameOver && !waitingForOpponent;
    const bActive = currentTurn === 'b' && !gameOver && !waitingForOpponent;

    if (wWrap) {
      wWrap.classList.toggle('active',    wActive);
      wWrap.classList.toggle('low-time',  whiteTime < 30 && whiteTime > 0);
      wWrap.classList.toggle('critical',  whiteTime < 10 && whiteTime > 0);
    }
    if (bWrap) {
      bWrap.classList.toggle('active',    bActive);
      bWrap.classList.toggle('low-time',  blackTime < 30 && blackTime > 0);
      bWrap.classList.toggle('critical',  blackTime < 10 && blackTime > 0);
    }

    // Tick-flash once per second
    const ws = Math.floor(whiteTime), bs = Math.floor(blackTime);
    if (wActive && ws !== lastSecondWhite) { lastSecondWhite = ws; tickFlash('white-clock-wrap'); }
    if (bActive && bs !== lastSecondBlack) { lastSecondBlack = bs; tickFlash('black-clock-wrap'); }
  }

  function stopLocalTimer() {
    if (timerRAF) { cancelAnimationFrame(timerRAF); timerRAF = null; }
    timerAnchorTs = null;
  }

  function setTimerAnchor() {
    // Record current moment as the reference point for the running clock.
    timerAnchorTs   = performance.now();
    timerAnchorWt   = whiteTime;
    timerAnchorBt   = blackTime;
    timerAnchorTurn = currentTurn;
  }

  function startLocalTimer() {
    stopLocalTimer();
    if (waitingForOpponent || gameOver) { updateClockDisplay(); return; }

    setTimerAnchor();

    function rafLoop(ts) {
      // Compute elapsed since the last anchor (in seconds)
      const elapsed = (performance.now() - timerAnchorTs) / 1000;

      // Derive current times from anchor — no accumulation error
      if (timerAnchorTurn === 'w') {
        whiteTime = Math.max(0, timerAnchorWt - elapsed);
        blackTime = timerAnchorBt;
      } else if (timerAnchorTurn === 'b') {
        blackTime = Math.max(0, timerAnchorBt - elapsed);
        whiteTime = timerAnchorWt;
      }

      updateClockDisplay();

      // Check time-out
      if (timerAnchorTurn === 'w' && whiteTime <= 0) {
        whiteTime = 0; gameOver = true; stopLocalTimer(); updateClockDisplay();
        document.getElementById('status').textContent = 'BLACK WINS ON TIME!';
        document.getElementById('status').className = 'checkmate';
        return;
      }
      if (timerAnchorTurn === 'b' && blackTime <= 0) {
        blackTime = 0; gameOver = true; stopLocalTimer(); updateClockDisplay();
        document.getElementById('status').textContent = 'WHITE WINS ON TIME!';
        document.getElementById('status').className = 'checkmate';
        return;
      }

      timerRAF = requestAnimationFrame(rafLoop);
    }

    timerRAF = requestAnimationFrame(rafLoop);
  }

  function syncTimeFromServer(data) {
    // Track initial time for ring-progress ratio (only grows if server sends bigger value)
    if (data.whiteTime !== undefined) {
      if (timerInitialWhite <= 0 || data.whiteTime > timerInitialWhite) timerInitialWhite = data.whiteTime;
      // Accept server's live time — it already has elapsed subtracted
      whiteTime = data.whiteTime;
    }
    if (data.blackTime !== undefined) {
      if (timerInitialBlack <= 0 || data.blackTime > timerInitialBlack) timerInitialBlack = data.blackTime;
      blackTime = data.blackTime;
    }

    if (gameOver || waitingForOpponent) {
      stopLocalTimer(); updateClockDisplay(); return;
    }

    // Always re-anchor from server values so the local countdown starts
    // from the correct live time rather than drifting from an old base.
    startLocalTimer();
  }
  // ── End Advanced Clock System ─────────────────────────────────────

  // --- Promotion handling ---
  function showPromotionModal(from, to) {
    return new Promise((resolve) => {
      pendingPromotion = { from, to };
      promotionResolve = resolve;
      document.getElementById('promotion-modal').style.display = 'flex';
    });
  }

  window.cancelPromotion = function() {
    document.getElementById('promotion-modal').style.display = 'none';
    if (promotionResolve) {
      promotionResolve('q');
      promotionResolve = null;
    }
    pendingPromotion = null;
  };

  document.querySelectorAll('.promo-piece').forEach(el => {
    el.addEventListener('click', () => {
      const piece = el.dataset.piece;
      document.getElementById('promotion-modal').style.display = 'none';
      if (promotionResolve) {
        promotionResolve(piece);
        promotionResolve = null;
      }
    });
  });

  // --- API & Game Flow ---
  async function joinGame() {
    try {
      const res = await fetch(`/api/game/${gameId}/join`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, userInfo })
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      if (data.color) myColor = data.color;
      waitingForOpponent = data.waitingForOpponent || data.waitingForAssignment;
      boardState = fenToBoard(data.fen);
      currentTurn = data.turn;
      gameOver = data.isGameOver || false;
      syncTimeFromServer(data);
      updatePlayerDisplays(data);
      toggleWaitingOverlay(waitingForOpponent);
      renderBoard();
      updateStatus(data);
      startPolling();
    } catch (err) {
      document.getElementById('status').textContent = 'Failed to join.';
      boardEl.innerHTML = `<div class="error">${err.message}</div>`;
    }
  }

  async function fetchGameState() {
    try {
      const res = await fetch(`/api/game/${gameId}/state`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      
      if (!myColor) {
        if (data.whiteUserId === userId) myColor = 'white';
        else if (data.blackUserId === userId) myColor = 'black';
        else if (!data.waitingForAssignment && data.whiteUserId && data.blackUserId) myColor = 'spectator';
      }
      
      const wasWaiting = waitingForOpponent;
      waitingForOpponent = data.waitingForOpponent || data.waitingForAssignment;
      currentTurn = data.turn;
      gameOver = data.isGameOver || false;
      syncTimeFromServer(data);
      updatePlayerDisplays(data);
      const newBoard = fenToBoard(data.fen);
      if (JSON.stringify(boardState) !== JSON.stringify(newBoard)) {
        boardState = newBoard;
        lastMove = data.lastMove;
        selectedSquare = null; possibleMoves = [];
        renderBoard();
      }
      updateStatus(data);
      if (wasWaiting !== waitingForOpponent) {
        toggleWaitingOverlay(waitingForOpponent);
        if (!waitingForOpponent) renderBoard();
      }
      if (gameOver) {
        stopLocalTimer();
        clearInterval(updateInterval);
      }
      // Draw offer state from server
      handleDrawOfferState(data.drawOffer || null);
    } catch (err) {}
  }

  async function makeMove(fromInt, toInt, promotionPiece = 'q') {
    if (waitingForOpponent || gameOver) return;
    const from = coordToAlgebraic(fromInt.row, fromInt.col);
    const to = coordToAlgebraic(toInt.row, toInt.col);
    try {
      const res = await fetch(`/api/game/${gameId}/move`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, from, to, promotion: promotionPiece })
      });
      const data = await res.json();
      if (res.ok && data.success) {
        boardState = fenToBoard(data.fen);
        lastMove = { from, to };
        currentTurn = data.turn;
        gameOver = data.isGameOver || false;
        syncTimeFromServer(data);
        updatePlayerDisplays(data);
        selectedSquare = null; possibleMoves = [];
        renderBoard();
        updateStatus(data);
        tg.HapticFeedback.impactOccurred('light');
        if (gameOver) stopLocalTimer();
      } else {
        document.getElementById('status').textContent = `Invalid: ${data.error||'move'}`;
        setTimeout(fetchGameState, 1000);
        selectedSquare = null; possibleMoves = [];
        renderBoard();
        tg.HapticFeedback.notificationOccurred('error');
      }
    } catch (err) { console.error(err); }
  }

  async function resignGame() {
    if (!myColor || myColor==='spectator' || waitingForOpponent || gameOver) return;
    showConfirm({
      icon: '🏳️',
      title: 'RESIGN GAME?',
      sub: 'You will lose the match.
This cannot be undone.',
      yesLabel: 'RESIGN',
      yesClass: 'danger',
      onYes: async () => {
        try {
          const res = await fetch(`/api/game/${gameId}/resign`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId })
          });
          const data = await res.json();
          if (res.ok) {
            gameOver = true;
            updateStatus(data);
            updatePlayerDisplays(data);
            renderBoard();
            stopLocalTimer();
          }
        } catch (err) { console.error(err); }
      }
    });
  }

  async function newGame() {
    try {
      const res = await fetch('/api/game/new', { method: 'POST' });
      const data = await res.json();
      window.location.href = `/?game=${data.gameId}`;
    } catch (err) {
      alert('Could not create new game.');
    }
  }

  function updateStatus(data) {
    // Legacy hidden element (some code paths still reference it)
    const s = document.getElementById('status');
    const bar = document.getElementById('game-status-bar');
    const phase = document.getElementById('status-phase');
    const line1 = document.getElementById('status-line1');
    const line2 = document.getElementById('status-line2');
    const dot   = document.getElementById('status-dot');
    const info  = document.getElementById('info');
    if (!bar) return;

    // Helper to set the bar state
    function setBar(phaseClass, phaseLabel, mainText, subText) {
      bar.className = '';
      bar.classList.add('phase-' + phaseClass);
      phase.textContent = phaseLabel;
      line1.textContent = mainText;
      line2.textContent = subText || '';
    }

    // ── Game over ──────────────────────────────────────────────────
    if (data.isGameOver) {
      let headline, sub;
      if (data.winner) {
        const winName = data.winner === 'white'
          ? (data.whitePlayer?.firstName || 'White')
          : (data.blackPlayer?.firstName || 'Black');
        const winIcon = data.winner === 'white' ? '⚪' : '⚫';
        headline = `${winIcon} ${winName.toUpperCase()} WINS!`;
        if (data.winner === myColor) sub = '🏆 You won!';
        else if (myColor && myColor !== 'spectator') sub = 'Better luck next time';
        else sub = `${data.winner.charAt(0).toUpperCase() + data.winner.slice(1)} wins the match`;
      } else if (data.isDraw) {
        headline = '🤝 DRAW BY AGREEMENT';
        sub = 'Honours even — well played!';
      } else {
        headline = 'GAME OVER';
        sub = '';
      }
      setBar('over', 'END', headline, sub);
      if (info) { info.textContent = 'Game finished'; info.style.color = '#c9a84c'; }
      if (s) s.textContent = headline;
      // Show the big board overlay
      showGameOverOverlay(data);
      return;
    }

    // ── Waiting for players ────────────────────────────────────────
    const hasWhite = !!(data.whiteUserId);
    const hasBlack = !!(data.blackUserId);

    if (!hasWhite && !hasBlack) {
      setBar('waiting', 'WAIT', 'WAITING FOR PLAYERS...', 'Share the link to invite someone');
      if (info) { info.textContent = 'Share the game!'; info.style.color = '#c9a84c'; }
      if (s) s.textContent = '⏳ WAITING FOR PLAYERS...';
      return;
    }

    if (data.waitingForAssignment || waitingForOpponent || (!hasWhite || !hasBlack)) {
      // One player is in
      const joinedName = hasWhite
        ? (data.whitePlayer?.firstName || 'White')
        : (data.blackPlayer?.firstName || 'Black');
      const joinedIcon = hasWhite ? '⚪' : '⚫';
      setBar('waiting', 'WAIT',
        `${joinedIcon} ${joinedName.toUpperCase()} JOINED`,
        'Waiting for opponent to join...');
      if (info) { info.textContent = 'Share the game!'; info.style.color = '#c9a84c'; }
      if (s) s.textContent = '⏳ WAITING FOR OPPONENT...';
      return;
    }

    // ── Both joined — show VS header once ─────────────────────────
    const whiteName = data.whitePlayer?.firstName || 'White';
    const blackName = data.blackPlayer?.firstName || 'Black';

    // ── Active game ────────────────────────────────────────────────
    const myTurn = (myColor==='white' && data.turn==='w') || (myColor==='black' && data.turn==='b');
    const activeName = data.turn === 'w' ? whiteName : blackName;
    const activeIcon = data.turn === 'w' ? '⚪' : '⚫';

    if (data.inCheck) {
      setBar('check', 'CHECK',
        `${activeIcon} ${activeName.toUpperCase()} IN CHECK!`,
        myTurn ? '⚠️ Your king is in check — move it!' : `${activeName} must escape check`);
      if (info) { info.textContent = myTurn ? 'YOUR TURN' : "OPPONENT'S TURN"; info.style.color = '#e84040'; }
      if (s) { s.textContent = `${data.turn==='w'?'WHITE':'BLACK'} IN CHECK!`; s.className = 'check'; }
    } else if (myTurn) {
      setBar('myturn', 'YOUR TURN',
        `${activeIcon} YOUR MOVE`,
        `${whiteName} ⚔ ${blackName}`);
      if (info) { info.textContent = 'YOUR TURN'; info.style.color = '#64b050'; }
      if (s) { s.textContent = "YOUR TURN"; s.className = ''; }
    } else {
      setBar('oppturn', 'PLAYING',
        `${activeIcon} ${activeName.toUpperCase()}'S TURN`,
        `${whiteName} ⚔ ${blackName}`);
      if (info) { info.textContent = "OPPONENT'S TURN"; info.style.color = '#c9a84c'; }
      if (s) { s.textContent = `${data.turn==='w'?'WHITE':'BLACK'}'S TURN`; s.className = ''; }
    }
  }

  function renderBoard() {
    boardEl.innerHTML = '';
    if (!boardState) return;
    for (let dr=0; dr<8; dr++) for (let dc=0; dc<8; dc++) {
      const int = displayToInternal(dr, dc);
      const piece = boardState[int.row][int.col];
      const cell = document.createElement('div');
      cell.className = `cell ${((dr+dc)%2===0)?'light':'dark'}`;
      if (lastMove) {
        const lf = { row: 8-parseInt(lastMove.from[1]), col: lastMove.from.charCodeAt(0)-97 };
        const lt = { row: 8-parseInt(lastMove.to[1]), col: lastMove.to.charCodeAt(0)-97 };
        const lfd = internalToDisplay(lf.row, lf.col), ltd = internalToDisplay(lt.row, lt.col);
        if ((dr===lfd.row&&dc===lfd.col)||(dr===ltd.row&&dc===ltd.col)) cell.classList.add('last-move-hi');
      }
      if (selectedSquare) {
        const sd = internalToDisplay(selectedSquare.row, selectedSquare.col);
        if (dr===sd.row && dc===sd.col) cell.classList.add('selected');
      }
      const move = possibleMoves.find(m => m.toRow===int.row && m.toCol===int.col);
      if (move) cell.classList.add(move.isCapture ? 'capture-highlight' : 'move-dot');
      if (piece) cell.innerHTML = mkPiece(piece.toUpperCase(), piece===piece.toUpperCase());
      cell.onclick = (() => { const i=int; return ()=>onCellClick(i.row,i.col); })();
      boardEl.appendChild(cell);
    }
  }

  async function onCellClick(row, col) {
    if (!myColor || myColor==='spectator' || waitingForOpponent || gameOver) return;
    const myTurn = (myColor==='white' && currentTurn==='w') || (myColor==='black' && currentTurn==='b');
    if (!myTurn) {
      tg.HapticFeedback.notificationOccurred('warning');
      document.getElementById('status').textContent = "Not your turn";
      return;
    }
    const piece = boardState[row][col];
    if (selectedSquare) {
      const move = possibleMoves.find(m => m.toRow===row && m.toCol===col);
      if (move) {
        const pieceMoved = boardState[selectedSquare.row][selectedSquare.col];
        const isPawn = pieceMoved && pieceMoved.toUpperCase() === 'P';
        const promotionRank = (myColor === 'white' && row === 0) || (myColor === 'black' && row === 7);
        let promo = 'q';
        if (isPawn && promotionRank) {
          promo = await showPromotionModal(selectedSquare, {row, col});
        }
        await makeMove(selectedSquare, {row, col}, promo);
        return;
      } else {
        selectedSquare = null; possibleMoves = [];
        renderBoard();
        if (piece) {
          const c = getPieceColor(piece);
          if ((myColor==='white'&&c==='white')||(myColor==='black'&&c==='black')) {
            selectedSquare = {row, col};
            possibleMoves = getMovesFromSquare(row, col);
            renderBoard();
            tg.HapticFeedback.selectionChanged();
          }
        }
      }
    } else {
      if (piece) {
        const c = getPieceColor(piece);
        if ((myColor==='white'&&c==='white')||(myColor==='black'&&c==='black')) {
          selectedSquare = {row, col};
          possibleMoves = getMovesFromSquare(row, col);
          renderBoard();
          tg.HapticFeedback.selectionChanged();
        }
      }
    }
  }

  function startPolling() { 
    if(updateInterval) clearInterval(updateInterval); 
    updateInterval = setInterval(fetchGameState, 1000);
    startChatPolling();
  }

  // ---------- CHAT JAVASCRIPT ----------
  let lastChatTimestamp = 0;
  let chatInterval = null;
  let unreadCount = 0;
  let chatOpen = false;

  function toggleChat() {
    chatOpen = !chatOpen;
    document.getElementById('chat-panel').classList.toggle('open', chatOpen);
    if (chatOpen) {
      unreadCount = 0;
      updateBadge();
      setTimeout(() => {
        const box = document.getElementById('chat-messages');
        box.scrollTop = box.scrollHeight;
        document.getElementById('chat-input').focus();
      }, 50);
    }
    tg.HapticFeedback?.selectionChanged();
  }

  function updateBadge() {
    const badge = document.getElementById('chat-badge');
    if (unreadCount > 0 && !chatOpen) {
      badge.style.display = 'flex';
      badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
    } else {
      badge.style.display = 'none';
    }
  }

  function appendChatMessage(msg) {
    const box = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `chat-msg ${msg.color || 'spectator'}`;
    div.innerHTML = `<span class="msg-name">${escapeHtml(msg.name)}:</span>`
                  + `<span class="msg-text">${escapeHtml(msg.text)}</span>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  async function sendChatMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    try {
      const res = await fetch(`/api/game/${gameId}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, text })
      });
      if (!res.ok) return;
      const data = await res.json();
      if (data.message) {
        appendChatMessage(data.message);
        lastChatTimestamp = data.message.timestamp;
        tg.HapticFeedback?.impactOccurred('light');
      }
    } catch (err) { console.error('Chat send error:', err); }
  }

  async function pollChat() {
    try {
      const res = await fetch(`/api/game/${gameId}/chat?since=${lastChatTimestamp}`);
      if (!res.ok) return;
      const data = await res.json();
      for (const msg of data.messages) {
        if (msg.userId !== userId) {
          appendChatMessage(msg);
          if (!chatOpen) { unreadCount++; updateBadge(); }
          tg.HapticFeedback?.impactOccurred('light');
        }
        lastChatTimestamp = Math.max(lastChatTimestamp, msg.timestamp);
      }
    } catch (err) {}
  }

  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); sendChatMessage(); }
  });

  function startChatPolling() {
    if (chatInterval) clearInterval(chatInterval);
    chatInterval = setInterval(pollChat, 1500);
  }

  window.toggleChat = toggleChat;
  window.sendChatMessage = sendChatMessage;

  // Start the app
  (async () => {
    await ensureGameId();
    joinGame();
  })();

  // ── Draw Offer Logic ─────────────────────────────────────────────
  let drawOfferPending = null;      // whose offer is showing: null | 'white' | 'black'
  let drawOfferSentByMe = false;    // I sent the current offer

  function updateDrawButton() {
    const btn = document.getElementById('draw-btn');
    if (!btn) return;
    const canOffer = myColor && myColor !== 'spectator' && !gameOver && !waitingForOpponent;
    btn.disabled = !canOffer || drawOfferPending !== null;
  }

  function showDrawBanner(show) {
    const banner = document.getElementById('draw-offer-banner');
    if (!banner) return;
    if (show) banner.classList.add('show');
    else banner.classList.remove('show');
  }

  function handleDrawOfferState(drawOffer) {
    // drawOffer = null | 'white' | 'black' (color that offered)
    if (!drawOffer) {
      drawOfferPending = null;
      drawOfferSentByMe = false;
      showDrawBanner(false);
      updateDrawButton();
      return;
    }
    if (drawOfferPending === drawOffer) return; // no change
    drawOfferPending = drawOffer;

    const offererColor = drawOffer;
    const iAmTheOfferer = myColor === offererColor;
    drawOfferSentByMe = iAmTheOfferer;

    if (iAmTheOfferer) {
      // Just show the button as disabled; no banner for sender
      showDrawBanner(false);
    } else if (myColor && myColor !== 'spectator') {
      // I'm the opponent — show the accept/decline banner
      showDrawBanner(true);
      tg.HapticFeedback?.notificationOccurred('warning');
    }
    updateDrawButton();
  }

  async function offerDraw() {
    if (!myColor || myColor === 'spectator' || gameOver || waitingForOpponent || drawOfferPending) return;
    showConfirm({
      icon: '🤝',
      title: 'OFFER A DRAW?',
      sub: 'Your opponent can accept
or decline the offer.',
      yesLabel: 'OFFER DRAW',
      yesClass: 'peace',
      onYes: async () => {
        try {
          const res = await fetch(`/api/game/${gameId}/draw-offer`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId })
          });
          const data = await res.json();
          if (res.ok) {
            handleDrawOfferState(data.drawOffer);
            tg.HapticFeedback?.impactOccurred('medium');
          }
        } catch (err) { console.error(err); }
      }
    });
  }

  async function acceptDraw() {
    try {
      const res = await fetch(`/api/game/${gameId}/draw-accept`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId })
      });
      const data = await res.json();
      showDrawBanner(false);
      if (res.ok) {
        gameOver = true;
        stopLocalTimer();
        updateStatus({ isGameOver: true, isDraw: true, winner: null });
        updatePlayerDisplays(data);
        renderBoard();
        tg.HapticFeedback?.notificationOccurred('success');
      }
    } catch (err) { console.error(err); }
  }

  async function declineDraw() {
    try {
      await fetch(`/api/game/${gameId}/draw-decline`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId })
      });
      drawOfferPending = null;
      showDrawBanner(false);
      updateDrawButton();
      tg.HapticFeedback?.impactOccurred('light');
    } catch (err) { console.error(err); }
  }

  window.offerDraw   = offerDraw;
  window.acceptDraw  = acceptDraw;
  window.declineDraw = declineDraw;

  // ── Confirm Dialog ───────────────────────────────────────────────
  let _confirmCallback = null;

  function showConfirm({ icon, title, sub, yesLabel, yesClass, onYes }) {
    document.getElementById('confirm-icon').textContent   = icon  || '⚠️';
    document.getElementById('confirm-title').textContent  = title || 'ARE YOU SURE?';
    document.getElementById('confirm-sub').textContent    = sub   || '';
    const yesBtn = document.getElementById('confirm-yes-btn');
    yesBtn.textContent = yesLabel || 'CONFIRM';
    yesBtn.className   = 'confirm-yes ' + (yesClass || 'danger');
    _confirmCallback   = onYes || null;
    document.getElementById('confirm-modal').classList.add('show');
    tg.HapticFeedback?.impactOccurred('medium');
  }

  function confirmYes() {
    document.getElementById('confirm-modal').classList.remove('show');
    if (_confirmCallback) { _confirmCallback(); _confirmCallback = null; }
  }

  function confirmNo() {
    document.getElementById('confirm-modal').classList.remove('show');
    _confirmCallback = null;
    tg.HapticFeedback?.impactOccurred('light');
  }

  window.showConfirm = showConfirm;
  window.confirmYes  = confirmYes;
  window.confirmNo   = confirmNo;
  // ── End Confirm Dialog ───────────────────────────────────────────
  // ── End Draw Offer Logic ──────────────────────────────────────────

  // ── Game Over Overlay ──────────────────────────────────────────
  function showGameOverOverlay(data) {
    const overlay  = document.getElementById('gameover-overlay');
    const emoji    = document.getElementById('go-emoji');
    const headline = document.getElementById('go-headline');
    const sub      = document.getElementById('go-sub');
    if (!overlay) return;

    const whiteName = data.whitePlayer?.firstName || 'White';
    const blackName = data.blackPlayer?.firstName || 'Black';

    if (data.isDraw || (!data.winner && data.isGameOver)) {
      emoji.textContent    = '🤝';
      headline.textContent = 'DRAW';
      sub.textContent      = 'Honours even — well played!';
    } else if (data.winner) {
      const winName  = data.winner === 'white' ? whiteName : blackName;
      const lostName = data.winner === 'white' ? blackName : whiteName;
      const iWon     = myColor === data.winner;

      if (iWon) {
        emoji.textContent    = '🏆';
        headline.textContent = 'YOU WIN!';
        sub.textContent      = `${winName} defeats ${lostName}`;
      } else if (myColor && myColor !== 'spectator') {
        emoji.textContent    = '💀';
        headline.textContent = 'YOU LOSE';
        sub.textContent      = `${winName} defeats ${lostName}`;
      } else {
        // Spectator
        emoji.textContent    = '🏆';
        headline.textContent = `${winName.toUpperCase()} WINS!`;
        sub.textContent      = `${winName} defeats ${lostName}`;
      }
    } else {
      emoji.textContent    = '🏁';
      headline.textContent = 'GAME OVER';
      sub.textContent      = '';
    }

    overlay.classList.add('show');
    tg.HapticFeedback?.notificationOccurred(data.winner === myColor ? 'success' : 'error');
  }

  function closeGameOverOverlay() {
    const overlay = document.getElementById('gameover-overlay');
    if (overlay) overlay.classList.remove('show');
  }

  window.closeGameOverOverlay = closeGameOverOverlay;
  // ── End Game Over Overlay ────────────────────────────────────────

  window.resignGame = resignGame;
  window.newGame = newGame;
</script>
</body>
</html>
