<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Chess</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #1e130a;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: Georgia, serif; color: #c9a84c;
  padding: 12px;
}

h2 { font-size: 1.3rem; letter-spacing: 5px; margin-bottom: 5px; color: #c9a84c; }

#status {
  font-size: 0.72rem; letter-spacing: 3px; min-height: 22px; margin-bottom: 8px; color: #9a7a3a;
  text-align: center;
}
#status.check { color: #e84040; font-weight: bold; animation: pulse 0.5s infinite alternate; }
#status.checkmate { color: #e82020; font-weight: bold; }
@keyframes pulse { from{opacity:1} to{opacity:0.2} }

#board-wrap {
  border: 3px solid #5a3c10;
  box-shadow: 0 8px 40px rgba(0,0,0,0.8);
  width: 100%;
  max-width: 576px;
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 12.5%);
  width: 100%;
  aspect-ratio: 1;
}

.cell {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
}
.light { background: #f0d9b5; }
.dark  { background: #b58863; }
.selected     { background: #64b050 !important; }
.last-move-hi { background: rgba(140,190,0,0.5) !important; }
.in-check     { background: rgba(210,20,20,0.7) !important; }

.cell svg {
  width: 88%; height: 88%;
  display: block;
  image-rendering: crisp-edges;
  shape-rendering: crispEdges;
}

#controls {
  margin-top: 12px; display:flex; gap:10px; align-items:center;
  flex-wrap: wrap; justify-content: center;
}
#info {
  font-size: 0.68rem; letter-spacing:3px; padding:5px 12px;
  border:1px solid #4a3010; color:#9a7a3a;
  text-align: center;
}
button {
  font-family:Georgia,serif; font-size:0.68rem; letter-spacing:3px; padding:7px 18px;
  background:transparent; color:#c9a84c; border:1.5px solid #4a3010; cursor:pointer;
}
button:hover { background:rgba(201,168,76,0.08); border-color:#c9a84c; }
#player-color {
  font-size: 0.7rem;
  margin-bottom: 5px;
  padding: 3px 10px;
  background: rgba(0,0,0,0.3);
  border-radius: 20px;
}
.loading {
  text-align: center;
  padding: 20px;
  color: #c9a84c;
}
</style>
</head>
<body>
<h2>♜ CHESS ♞</h2>
<div id="player-color"></div>
<div id="status">Loading game...</div>
<div id="board-wrap"><div id="board" class="loading">Loading chess board...</div></div>
<div id="controls">
  <div id="info"></div>
  <button onclick="location.reload()">NEW GAME</button>
</div>

<script>
// Piece SVG generation (same as original)
function mkPiece(type, isWhite) {
  var f  = isWhite ? '#ffffff' : '#1c1c1c';
  var f2 = isWhite ? '#ddd0b8' : '#333333';
  var sk = isWhite ? '#3a2008' : '#e8d0a0';
  var sw = '1.4';

  var s = {
    P: '<ellipse cx="22.5" cy="9.5" rx="5.2" ry="5.2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<path d="M19.5 14.5 C17 17 16.5 19.5 17.5 21.5 L15 21.5 C13.5 22.5 13.5 24.5 15 25.5 L30 25.5 C31.5 24.5 31.5 22.5 30 21.5 L27.5 21.5 C28.5 19.5 28 17 25.5 14.5 Z" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="11.5" y="25.5" width="22" height="4" rx="2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="9.5"  y="29.5" width="26" height="4.5" rx="2.2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>',
    R: '<rect x="9.5"  y="9.5"  width="5"   height="8"  rx="1" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="20"   y="9.5"  width="5"   height="8"  rx="1" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="30.5" y="9.5"  width="5"   height="8"  rx="1" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="11"   y="17"   width="23"  height="14" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="9.5"  y="30.5" width="26"  height="4.5" rx="2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="13"   y="23"   width="4"   height="5"  rx="1" fill="'+f2+'" stroke="'+sk+'" stroke-width="0.8"/>'
      +'<rect x="20.5" y="23"   width="4"   height="5"  rx="1" fill="'+f2+'" stroke="'+sk+'" stroke-width="0.8"/>'
      +'<rect x="28"   y="23"   width="4"   height="5"  rx="1" fill="'+f2+'" stroke="'+sk+'" stroke-width="0.8"/>',
    N: '<rect x="9.5" y="33" width="26" height="4.5" rx="2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<path d="M13 33 L13 22 C13 14 16 10 22.5 9 C26 8.5 29 10 30 13 C31.5 16 31 19 29 21 L32 21 L32 25 C32 30 28 33 22.5 33 Z" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<path d="M16 20 L28 20 L28 24 C28 26 25 27 22.5 27 C20 27 16 26 16 24 Z" fill="'+f2+'" stroke="'+sk+'" stroke-width="0.9"/>'
      +'<line x1="18" y1="22" x2="27" y2="22" stroke="'+sk+'" stroke-width="1.1"/>'
      +'<line x1="18" y1="24.5" x2="27" y2="24.5" stroke="'+sk+'" stroke-width="1.1"/>'
      +'<path d="M22.5 9 C21 5 18 4 16 6 C18 6.5 19.5 8 20 10" fill="'+f2+'" stroke="'+sk+'" stroke-width="0.9"/>',
    B: '<circle cx="22.5" cy="7" r="3" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<path d="M22.5 10 C17.5 10 13.5 14.5 13.5 20.5 C13.5 24.5 15.5 27 19 28 L26 28 C29.5 27 31.5 24.5 31.5 20.5 C31.5 14.5 27.5 10 22.5 10 Z" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="14" y="28" width="17" height="3" rx="1.5" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="9.5" y="30.5" width="26" height="4.5" rx="2.2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<line x1="22.5" y1="9.5" x2="22.5" y2="5" stroke="'+sk+'" stroke-width="'+sw+'" stroke-linecap="round"/>'
      +'<ellipse cx="22.5" cy="19" rx="4" ry="5" fill="'+f2+'" stroke="'+sk+'" stroke-width="0.8"/>',
    Q: '<circle cx="9.5"  cy="13" r="3" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<circle cx="16.5" cy="10" r="3" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<circle cx="22.5" cy="8.5" r="3.2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<circle cx="28.5" cy="10" r="3" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<circle cx="35.5" cy="13" r="3" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<path d="M9 26 L9.5 16 L16.5 21 L22.5 11.5 L28.5 21 L35.5 16 L36 26 Z" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="10" y="26" width="25" height="3.5" rx="1.5" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="9.5" y="29.5" width="26" height="4.5" rx="2.2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>',
    K: '<rect x="20" y="4.5"  width="5"  height="13" rx="1.5" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="15" y="8.5"  width="15" height="5"  rx="1.5" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<path d="M13.5 28.5 C13.5 21 16 18 22.5 18 C29 18 31.5 21 31.5 28.5 Z" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="11"  y="28.5" width="23" height="3"  rx="1" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
      +'<rect x="9.5" y="31"   width="26" height="4.5" rx="2.2" fill="'+f+'" stroke="'+sk+'" stroke-width="'+sw+'"/>'
  };
  return '<svg viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg">' + (s[type] || '') + '</svg>';
}

// Game state
let gameId = null;
let clientId = null;
let myColor = null;
let selectedSquare = null;
let boardState = null;
let updateInterval = null;
let lastMove = null;

// Get URL parameters
const urlParams = new URLSearchParams(window.location.search);
gameId = urlParams.get('game');
const preferredColor = urlParams.get('color');

if (!gameId) {
  document.getElementById('board').innerHTML = '<div class="loading">No game specified. Please use the link from the bot.</div>';
  document.getElementById('status').textContent = 'INVALID GAME';
}

// Generate or retrieve client ID
function getClientId() {
  let id = localStorage.getItem('chess_client_id');
  if (!id) {
    id = 'client_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
    localStorage.setItem('chess_client_id', id);
  }
  return id;
}

clientId = getClientId();

// Convert FEN to board array
function fenToBoard(fen) {
  const board = Array(8).fill().map(() => Array(8).fill(''));
  const parts = fen.split(' ')[0];
  const rows = parts.split('/');
  
  for (let i = 0; i < 8; i++) {
    let col = 0;
    for (let j = 0; j < rows[i].length; j++) {
      const ch = rows[i][j];
      if (isNaN(parseInt(ch))) {
        board[i][col] = ch;
        col++;
      } else {
        col += parseInt(ch);
      }
    }
  }
  return board;
}

// Convert coordinates to algebraic notation
function coordToAlgebraic(row, col) {
  const files = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
  const ranks = ['8', '7', '6', '5', '4', '3', '2', '1'];
  return files[col] + ranks[row];
}

// Join game
async function joinGame() {
  try {
    const response = await fetch(`/api/game/${gameId}/join`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clientId, preferredColor })
    });
    
    if (!response.ok) throw new Error('Failed to join game');
    
    const data = await response.json();
    myColor = data.color;
    
    document.getElementById('player-color').innerHTML = `You are playing as: ${myColor.toUpperCase()}`;
    if (myColor === 'spectator') {
      document.getElementById('player-color').style.color = '#888';
      document.getElementById('status').textContent = 'SPECTATING MODE';
    }
    
    boardState = fenToBoard(data.fen);
    lastMove = null;
    renderBoard();
    updateStatus(data);
    
    // Start polling for updates
    if (updateInterval) clearInterval(updateInterval);
    updateInterval = setInterval(fetchGameState, 1000);
  } catch (error) {
    console.error('Join error:', error);
    document.getElementById('status').textContent = 'ERROR CONNECTING TO GAME';
  }
}

// Fetch current game state
async function fetchGameState() {
  try {
    const response = await fetch(`/api/game/${gameId}/state?clientId=${clientId}`);
    if (!response.ok) throw new Error('Failed to fetch state');
    
    const data = await response.json();
    const newFen = data.fen;
    const newBoard = fenToBoard(newFen);
    
    // Check if board changed
    if (JSON.stringify(boardState) !== JSON.stringify(newBoard)) {
      boardState = newBoard;
      lastMove = data.lastMove;
      renderBoard();
    }
    
    updateStatus(data);
  } catch (error) {
    console.error('Fetch error:', error);
  }
}

// Update UI status
function updateStatus(data) {
  const statusDiv = document.getElementById('status');
  const infoDiv = document.getElementById('info');
  
  if (data.isGameOver) {
    if (data.winner) {
      statusDiv.textContent = `GAME OVER - ${data.winner.toUpperCase()} WINS!`;
      statusDiv.className = 'checkmate';
    } else if (data.isStalemate) {
      statusDiv.textContent = 'STALEMATE - DRAW';
      statusDiv.className = '';
    } else {
      statusDiv.textContent = 'GAME OVER';
      statusDiv.className = '';
    }
    if (updateInterval) clearInterval(updateInterval);
  } else if (data.inCheck) {
    statusDiv.textContent = `${data.turn === 'w' ? 'WHITE' : 'BLACK'} IS IN CHECK!`;
    statusDiv.className = 'check';
  } else {
    statusDiv.textContent = `${data.turn === 'w' ? 'WHITE' : 'BLACK'}'S TURN`;
    statusDiv.className = '';
  }
  
  const turnColor = data.turn === 'w' ? 'white' : 'black';
  if (myColor === turnColor && !data.isGameOver) {
    infoDiv.textContent = 'YOUR TURN';
    infoDiv.style.color = '#64b050';
  } else if (!data.isGameOver) {
    infoDiv.textContent = "OPPONENT'S TURN";
    infoDiv.style.color = '#c9a84c';
  } else {
    infoDiv.textContent = 'GAME FINISHED';
    infoDiv.style.color = '#9a7a3a';
  }
}

// Make a move
async function makeMove(fromRow, fromCol, toRow, toCol) {
  const from = coordToAlgebraic(fromRow, fromCol);
  const to = coordToAlgebraic(toRow, toCol);
  
  try {
    const response = await fetch(`/api/game/${gameId}/move`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clientId, from, to, promotion: 'q' })
    });
    
    const data = await response.json();
    
    if (response.ok && data.success) {
      boardState = fenToBoard(data.fen);
      lastMove = { from, to };
      renderBoard();
      updateStatus(data);
      selectedSquare = null;
    } else {
      document.getElementById('status').textContent = `INVALID MOVE: ${data.error || 'Try again'}`;
      setTimeout(() => {
        if (!data.isGameOver) updateStatus({ turn: data.turn || 'w', inCheck: false, isGameOver: false });
      }, 1500);
      selectedSquare = null;
      renderBoard();
    }
  } catch (error) {
    console.error('Move error:', error);
    document.getElementById('status').textContent = 'ERROR MAKING MOVE';
    selectedSquare = null;
    renderBoard();
  }
}

// Render chess board
function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  boardEl.classList.remove('loading');
  
  if (!boardState) {
    boardEl.innerHTML = '<div class="loading">Loading board...</div>';
    return;
  }
  
  for (let i = 0; i < 8; i++) {
    for (let j = 0; j < 8; j++) {
      const cell = document.createElement('div');
      cell.className = 'cell ' + ((i + j) % 2 === 0 ? 'light' : 'dark');
      
      // Highlight last move
      if (lastMove) {
        const lastFrom = lastMove.from;
        const lastTo = lastMove.to;
        const fromRow = 8 - parseInt(lastFrom[1]);
        const fromCol = lastFrom.charCodeAt(0) - 97;
        const toRow = 8 - parseInt(lastTo[1]);
        const toCol = lastTo.charCodeAt(0) - 97;
        if ((i === fromRow && j === fromCol) || (i === toRow && j === toCol)) {
          cell.classList.add('last-move-hi');
        }
      }
      
      // Highlight selected square
      if (selectedSquare && selectedSquare.row === i && selectedSquare.col === j) {
        cell.classList.add('selected');
      }
      
      const piece = boardState[i][j];
      if (piece) {
        const isWhite = piece === piece.toUpperCase() && piece !== piece.toLowerCase();
        cell.innerHTML = mkPiece(piece.toUpperCase(), isWhite);
      }
      
      cell.onclick = (function(row, col) {
        return function() { onCellClick(row, col); };
      })(i, j);
      
      boardEl.appendChild(cell);
    }
  }
}

// Handle cell click
function onCellClick(row, col) {
  if (!myColor || myColor === 'spectator') {
    document.getElementById('status').textContent = 'SPECTATORS CANNOT MOVE';
    return;
  }
  
  const piece = boardState[row][col];
  
  if (selectedSquare === null) {
    // Select piece if it belongs to player
    if (piece) {
      const pieceIsWhite = piece === piece.toUpperCase() && piece !== piece.toLowerCase();
      const myColorIsWhite = myColor === 'white';
      if ((myColorIsWhite && pieceIsWhite) || (!myColorIsWhite && !pieceIsWhite)) {
        selectedSquare = { row, col };
        renderBoard();
      }
    }
  } else {
    // Attempt move
    makeMove(selectedSquare.row, selectedSquare.col, row, col);
  }
}

// Initialize
if (gameId) {
  joinGame();
}
</script>
</body>
</html>
