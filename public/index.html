<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>♜ Chess · Time Control</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--tg-theme-bg-color, #1e130a);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: Georgia, serif;
      color: var(--tg-theme-text-color, #c9a84c);
      padding: 12px;
    }
    h2 { font-size: 1.3rem; letter-spacing: 5px; margin-bottom: 5px; }

    /* ----- TOP & BOTTOM PLAYER CARDS (North & South) ----- */
    .player-card-top, .player-card-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.3);
      padding: 4px 12px;
      border-radius: 30px;
      border: 1px solid var(--tg-theme-button-color, #4a3010);
      width: 100%;
      max-width: 576px;
      cursor: pointer;
    }
    .player-card-top {
      margin-bottom: 6px;
    }
    .player-card-bottom {
      margin-top: 6px;
    }
    .player-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #5a3c10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #c9a84c;
      overflow: hidden;
    }
    .player-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .player-info {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .player-name {
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }
    .player-color-badge {
      font-size: 0.6rem;
      opacity: 0.8;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .player-side-indicator {
      font-size: 0.7rem;
      opacity: 0.9;
    }
    .player-card-top.own-side, .player-card-bottom.own-side {
      border-color: #64b050 !important;
      box-shadow: 0 0 6px rgba(100,176,80,0.3);
    }

    /* Spectator count badge */
    .spectator-badge {
      position: absolute;
      top: 10px;
      right: 16px;
      background: rgba(0,0,0,0.4);
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 0.65rem;
      border: 1px dashed var(--tg-theme-button-color);
      display: flex;
      align-items: center;
      gap: 4px;
      z-index: 5;
    }

    /* ── Clocks (vertical arrangement) ── */
    #clocks {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 576px;
      gap: 6px;
      margin: 6px 0;
    }

    .clock-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--tg-theme-button-color, #4a3010);
      border-radius: 24px;
      padding: 4px 10px 4px 4px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .clock-svg-ring {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.6));
      transition: filter 0.3s;
    }

    .ring-track {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 6;
    }
    .ring-progress {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.18s linear, stroke 0.4s ease;
      transform-origin: center;
      transform: rotate(-90deg);
    }
    .ring-bg-circle {
      fill: #1a1005;
      stroke: rgba(201,168,76,0.15);
      stroke-width: 1.5;
    }

    .clock-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .clock-digits {
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: #c9a84c;
      letter-spacing: 1px;
      line-height: 1.1;
      transition: color 0.3s;
    }
    .clock-label {
      font-family: Georgia, serif;
      font-size: 0.55rem;
      color: rgba(201,168,76,0.45);
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1;
    }

    /* Active states */
    .clock-wrap.active {
      border-color: #64b050;
      box-shadow: 0 0 8px rgba(100,176,80,0.4);
    }
    .clock-wrap.active .clock-digits { color: #e8d06a; }
    .clock-wrap.active .ring-progress { filter: drop-shadow(0 0 3px currentColor); }

    /* Low-time */
    .clock-wrap.low-time { border-color: #e84040; box-shadow: 0 0 8px rgba(232,64,64,0.4); }
    .clock-wrap.low-time .ring-progress { stroke: #e84040 !important; }
    .clock-wrap.low-time .clock-digits  { color: #ff6060 !important; animation: clock-urgent-pulse 0.6s ease-in-out infinite alternate; }

    /* Critical */
    .clock-wrap.critical .clock-digits { animation: clock-critical-pulse 0.3s ease-in-out infinite alternate !important; }

    @keyframes clock-urgent-pulse {
      from { opacity: 1; } to { opacity: 0.4; }
    }
    @keyframes clock-critical-pulse {
      from { opacity: 1; } to { opacity: 0.25; }
    }

    /* Tick flash */
    .clock-wrap.tick-flash .clock-digits { color: #ffffff !important; }

    /* Inactive dimmed */
    .clock-wrap:not(.active):not(.low-time) .clock-digits { color: rgba(201,168,76,0.4); }
    .clock-wrap:not(.active):not(.low-time) .ring-progress { opacity: 0.3; }

    /* Ordering for clocks based on player color (set via JS) */
    .clock-wrap.order-top { order: 1; }
    .clock-wrap.order-bottom { order: 3; }

    /* ── Game Status Bar ── */
    #game-status-bar {
      width: 100%;
      max-width: 576px;
      margin-bottom: 8px;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(0,0,0,0.6);
      border: 1.5px solid rgba(255,255,255,0.12);
      min-height: 44px;
      display: flex;
      align-items: stretch;
    }
    #status-phase {
      display: flex; align-items: center; justify-content: center;
      padding: 0 12px; font-size: 0.58rem; letter-spacing: 2px;
      text-transform: uppercase; font-family: Georgia, serif;
      white-space: nowrap; min-width: 76px; font-weight: bold;
      border-right: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.35);
      transition: background 0.3s, color 0.3s;
      color: #ffffff;
    }
    #status-main {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 5px 12px; gap: 3px;
    }
    #status-line1 {
      font-size: 0.8rem; letter-spacing: 2px;
      font-family: Georgia, serif; font-weight: bold;
      color: #ffffff; transition: color 0.3s;
    }
    #status-line2 {
      font-size: 0.6rem; letter-spacing: 1.5px;
      color: rgba(255,255,255,0.55);
      font-family: Georgia, serif; min-height: 10px;
      transition: color 0.3s;
    }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      margin: auto 14px auto 0; flex-shrink: 0;
      background: transparent;
      transition: background 0.3s, box-shadow 0.3s;
    }

    /* WAITING — amber */
    #game-status-bar.phase-waiting {
      border-color: rgba(201,168,76,0.4);
      background: rgba(40,25,5,0.75);
    }
    #game-status-bar.phase-waiting #status-phase { color: #f5c842; background: rgba(201,168,76,0.15); }
    #game-status-bar.phase-waiting #status-line1 { color: #f5c842; }
    #game-status-bar.phase-waiting #status-line2 { color: rgba(245,200,66,0.6); }
    #game-status-bar.phase-waiting #status-dot   { background: rgba(245,200,66,0.4); }

    /* OPPONENT TURN */
    #game-status-bar.phase-oppturn {
      border-color: rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.6);
    }
    #game-status-bar.phase-oppturn #status-phase { color: #ccc; }
    #game-status-bar.phase-oppturn #status-line1 { color: #eeeeee; }
    #game-status-bar.phase-oppturn #status-line2 { color: rgba(200,200,200,0.6); }
    #game-status-bar.phase-oppturn #status-dot   { background: rgba(200,200,200,0.3); }

    /* YOUR TURN */
    #game-status-bar.phase-myturn {
      border-color: #4caf50;
      background: rgba(0,40,0,0.65);
      box-shadow: 0 0 10px rgba(76,175,80,0.3);
    }
    #game-status-bar.phase-myturn #status-phase {
      color: #ffffff; background: rgba(76,175,80,0.3);
    }
    #game-status-bar.phase-myturn #status-line1 { color: #76ff76; }
    #game-status-bar.phase-myturn #status-line2 { color: rgba(120,255,120,0.7); }
    #game-status-bar.phase-myturn #status-dot   { background: #4caf50; box-shadow: 0 0 8px #4caf50; }

    /* CHECK */
    #game-status-bar.phase-check {
      border-color: #f44336;
      background: rgba(60,0,0,0.7);
      box-shadow: 0 0 10px rgba(244,67,54,0.4);
    }
    #game-status-bar.phase-check #status-phase { color: #ffffff; background: rgba(244,67,54,0.35); }
    #game-status-bar.phase-check #status-line1 { color: #ff6b6b; animation: status-pulse 0.5s infinite alternate; }
    #game-status-bar.phase-check #status-line2 { color: rgba(255,150,150,0.7); }
    #game-status-bar.phase-check #status-dot   { background: #f44336; box-shadow: 0 0 8px #f44336; animation: status-pulse 0.5s infinite alternate; }

    /* GAME OVER */
    #game-status-bar.phase-over {
      border-color: rgba(201,168,76,0.5);
      background: rgba(20,12,3,0.8);
    }
    #game-status-bar.phase-over #status-phase { color: #f5c842; background: rgba(201,168,76,0.1); }
    #game-status-bar.phase-over #status-line1 { color: #ffffff; font-size: 0.85rem; }
    #game-status-bar.phase-over #status-line2 { color: rgba(245,200,66,0.7); }

    @keyframes status-pulse { from{opacity:1} to{opacity:0.2} }

    #status { display: none; }

    #board-wrap {
      border: 3px solid var(--tg-theme-button-color, #5a3c10);
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
      width: 100%;
      max-width: 576px;
      position: relative;
      order: 2; /* sits between clocks */
    }
    #board {
      display: grid;
      grid-template-columns: repeat(8, 12.5%);
      width: 100%;
      aspect-ratio: 1;
      background: #2a1e0f;
      color: rgba(201,168,76,0.5);
      font-family: Georgia, serif;
      font-size: 0.8rem;
      letter-spacing: 3px;
    }
    .cell {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative;
    }
    .light { background: #f0d9b5; }
    .dark  { background: #b58863; }
    .selected     { background: #64b050 !important; }
    .last-move-hi { background: rgba(140,190,0,0.5) !important; }
    .in-check     { background: rgba(210,20,20,0.7) !important; }
    .cell svg { width: 88%; height: 88%; display: block; }

    .move-dot::after {
      content: '';
      position: absolute;
      width: 22%;
      height: 22%;
      background: #4CAF50;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.85;
      pointer-events: none;
    }
    .capture-highlight {
      box-shadow: inset 0 0 0 3.5px #4CAF50 !important;
    }

    #waiting-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(30,19,10,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      z-index: 10;
      border-radius: inherit;
    }
    .waiting-message {
      text-align: center;
      font-size: 1.2rem;
      letter-spacing: 3px;
      color: #c9a84c;
    }

    /* Game Over Overlay */
    #gameover-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 6, 2, 0.88);
      backdrop-filter: blur(6px);
      z-index: 20;
      border-radius: inherit;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      animation: go-fade-in 0.45s ease-out;
    }
    #gameover-overlay.show { display: flex; }

    @keyframes go-fade-in {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    #go-emoji {
      font-size: 3.2rem;
      line-height: 1;
      margin-bottom: 10px;
      animation: go-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
    }
    @keyframes go-pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    #go-headline {
      font-family: Georgia, serif;
      font-size: clamp(1.25rem, 5vw, 1.85rem);
      font-weight: bold;
      letter-spacing: 4px;
      color: #fff;
      text-align: center;
      padding: 0 16px;
      text-shadow: 0 0 24px rgba(201,168,76,0.6);
      animation: go-slide-up 0.4s ease-out 0.25s both;
      line-height: 1.2;
    }
    #go-sub {
      font-family: Georgia, serif;
      font-size: 0.72rem;
      letter-spacing: 2.5px;
      color: rgba(201,168,76,0.7);
      text-align: center;
      margin-top: 8px;
      padding: 0 20px;
      animation: go-slide-up 0.4s ease-out 0.35s both;
    }
    @keyframes go-slide-up {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .go-divider {
      width: 48px;
      height: 1px;
      background: rgba(201,168,76,0.35);
      margin: 16px auto;
      animation: go-slide-up 0.4s ease-out 0.4s both;
    }

    #go-exit-btn {
      font-family: Georgia, serif;
      font-size: 0.72rem;
      letter-spacing: 3px;
      padding: 10px 32px;
      background: rgba(201,168,76,0.1);
      color: #c9a84c;
      border: 1.5px solid rgba(201,168,76,0.5);
      border-radius: 4px;
      cursor: pointer;
      animation: go-slide-up 0.4s ease-out 0.5s both;
      transition: background 0.2s, border-color 0.2s;
    }
    #go-exit-btn:hover { background: rgba(201,168,76,0.22); border-color: #c9a84c; }

    #go-new-btn {
      font-family: Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 2px;
      padding: 8px 24px;
      background: transparent;
      color: rgba(201,168,76,0.5);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
      animation: go-slide-up 0.4s ease-out 0.58s both;
      transition: color 0.2s, border-color 0.2s;
    }
    #go-new-btn:hover { color: #c9a84c; border-color: rgba(201,168,76,0.5); }

    #controls {
      margin-top: 12px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center;
    }
    #info {
      font-size: 0.68rem; letter-spacing: 3px; padding: 5px 12px;
      border: 1px solid var(--tg-theme-button-color, #4a3010);
    }
    button {
      font-family: Georgia, serif; font-size: 0.68rem; letter-spacing: 3px; padding: 7px 18px;
      background: transparent; color: var(--tg-theme-text-color, #c9a84c);
      border: 1.5px solid var(--tg-theme-button-color, #4a3010); cursor: pointer;
    }
    button:hover { background: rgba(201,168,76,0.08); }
    #resign-btn {
      background: rgba(200, 40, 40, 0.1);
      border-color: #a04040;
      color: #e0a0a0;
    }
    #draw-btn {
      background: rgba(100,176,80,0.08);
      border-color: #4a7040;
      color: #a5d6a5;
    }
    #draw-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* Draw offer incoming banner */
    #draw-offer-banner {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1005;
      border: 1.5px solid #c9a84c;
      border-radius: 12px;
      padding: 12px 18px;
      text-align: center;
      z-index: 200;
      min-width: 260px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.8);
      animation: banner-pop 0.2s ease-out;
    }
    #draw-offer-banner.show { display: block; }
    @keyframes banner-pop {
      from { opacity: 0; transform: translateX(-50%) scale(0.92); }
      to   { opacity: 1; transform: translateX(-50%) scale(1); }
    }
    #draw-offer-banner p {
      font-size: 0.78rem;
      letter-spacing: 2px;
      color: #c9a84c;
      margin-bottom: 10px;
    }
    .draw-banner-btns { display: flex; gap: 10px; justify-content: center; }
    .draw-accept-btn {
      background: rgba(100,176,80,0.15);
      border: 1.5px solid #64b050;
      color: #a5d6a5;
      font-family: Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 2px;
      padding: 6px 16px;
      cursor: pointer;
      border-radius: 4px;
    }
    .draw-accept-btn:hover { background: rgba(100,176,80,0.3); }
    .draw-decline-btn {
      background: rgba(200,40,40,0.1);
      border: 1.5px solid #a04040;
      color: #e0a0a0;
      font-family: Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 2px;
      padding: 6px 16px;
      cursor: pointer;
      border-radius: 4px;
    }
    .draw-decline-btn:hover { background: rgba(200,40,40,0.25); }

    /* Stats Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-content {
      background: var(--tg-theme-bg-color, #2a1e0f);
      border: 2px solid var(--tg-theme-button-color, #c9a84c);
      border-radius: 16px;
      padding: 20px;
      max-width: 300px;
      width: 90%;
      text-align: center;
    }
    .modal-content h3 { margin-bottom: 15px; }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 15px 0;
    }
    .stat-item {
      background: rgba(0,0,0,0.3);
      padding: 8px;
      border-radius: 8px;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #c9a84c;
    }
    .stat-label {
      font-size: 0.7rem;
      opacity: 0.8;
    }
    .close-btn {
      margin-top: 10px;
      padding: 8px 20px;
      background: var(--tg-theme-button-color, #5a3c10);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Promotion Modal */
    .promo-options {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
    }
    .promo-piece {
      width: 50px;
      height: 50px;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 5px;
      background: rgba(0,0,0,0.2);
    }
    .promo-piece:hover {
      border-color: #c9a84c;
      background: rgba(201,168,76,0.2);
    }

    /* Chat Panel */
    #chat-fab {
      position: fixed; bottom: 22px; right: 18px;
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--tg-theme-button-color, #5a3c10);
      border: 2px solid rgba(201,168,76,0.5);
      color: #c9a84c; font-size: 1.35rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 18px rgba(0,0,0,0.6);
      z-index: 100;
      transition: transform 0.15s;
    }
    #chat-fab:active { transform: scale(0.92); }

    #chat-badge {
      position: absolute; top: -4px; right: -4px;
      background: #e84040; color: #fff;
      font-size: 0.55rem; font-family: Georgia, serif;
      width: 17px; height: 17px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      font-weight: bold;
    }

    #chat-panel {
      position: fixed; bottom: 80px; right: 12px;
      width: min(340px, calc(100vw - 24px));
      background: #1a0f06;
      border: 1.5px solid rgba(201,168,76,0.35);
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
      display: none; flex-direction: column;
      z-index: 99;
      border-radius: 8px;
      overflow: hidden;
    }
    #chat-panel.open { display: flex; }

    #chat-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 12px;
      border-bottom: 1px solid rgba(201,168,76,0.2);
      font-size: 0.63rem; letter-spacing: 3px;
      color: #c9a84c;
    }
    #chat-close {
      background: none; border: none; cursor: pointer;
      color: rgba(201,168,76,0.7); font-size: 1rem; padding: 0 2px;
      line-height: 1;
    }
    #chat-close:hover { color: #c9a84c; }

    #chat-messages {
      height: 200px; overflow-y: auto;
      padding: 8px 10px;
      display: flex; flex-direction: column; gap: 5px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 3px; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); }

    .chat-msg { 
      font-size: 0.7rem; line-height: 1.45; word-break: break-word;

    }

      color: #c9a84c; font-style: italic;

    }

    #chat-input-row { display: flex; border-top: 1px solid rgba(201,168,76,0.2); }
    #chat-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: Georgia, serif; font-size: 0.72rem;
      color: #eee;
      padding: 9px 10px; letter-spacing: 1px;
    }
    #chat-input::placeholder { color: rgba(201,168,76,0.5); }
    #chat-send {

      background: transparent; color: #c9a84c;
      padding: 0 14px; cursor: pointer; font-size: 1rem;
    }
    #chat-send:hover { background: rgba(201,168,76,0.1); }

    /* ── Captured Pieces ── */
    .captured-row {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 576px;
      margin-bottom: 4px;
      gap: 8px;
    }
    .captured-strip {
      flex: 1;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1px;
      min-height: 18px;
      padding: 2px 6px;

      border: 1px solid rgba(255,255,255,0.05);

      font-size: 0.85rem;
      line-height: 1;
      opacity: 0.9;
    }
    .captured-advantage {
      font-family: Georgia, serif;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.5);
      margin-left: 4px;
      letter-spacing: 1px;
    }
    .captured-advantage.positive { color: #76ff76; }
  </style>
</head>
<body>
<h2>♜ CHESS ♞</h2>

<!-- Spectator count -->
<div class="spectator-badge" id="spectator-count">
  👁️ <span id="spec-count">0</span>
</div>

<!-- TOP PLAYER CARD (Opponent / North) -->
<div class="player-card-top" id="top-player-card">
  <div class="player-avatar" id="top-avatar">♚</div>
  <div class="player-info">
    <span class="player-name" id="top-name">Opponent</span>
    <span class="player-color-badge">
      <span id="top-color">⚫ Black</span>
      <span class="player-side-indicator" id="top-side-indicator">▲</span>
    </span>
  </div>
</div>

<!-- CLOCKS (vertical column) -->
<div id="clocks">
  <!-- White clock wrap (will be repositioned via JS) -->
  <div class="clock-wrap" id="white-clock-wrap">
    <svg class="clock-svg-ring" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <circle class="ring-bg-circle" cx="18" cy="18" r="16"/>
      <circle class="ring-track" cx="18" cy="18" r="13"/>
      <circle class="ring-progress" id="white-ring" cx="18" cy="18" r="13"
              stroke="#64b050" stroke-dasharray="81.68" stroke-dashoffset="0"/>
    </svg>
    <div class="clock-info">
      <span class="clock-digits" id="white-clock">10:00</span>
      <span class="clock-label">White</span>
    </div>
  </div>

  <!-- Black clock wrap -->
  <div class="clock-wrap" id="black-clock-wrap">
    <svg class="clock-svg-ring" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <circle class="ring-bg-circle" cx="18" cy="18" r="16"/>
      <circle class="ring-track" cx="18" cy="18" r="13"/>
      <circle class="ring-progress" id="black-ring" cx="18" cy="18" r="13"
              stroke="#64b050" stroke-dasharray="81.68" stroke-dashoffset="0"/>
    </svg>
    <div class="clock-info">
      <span class="clock-digits" id="black-clock">10:00</span>
      <span class="clock-label">Black</span>
    </div>
  </div>
</div>

<!-- Game Status Bar -->
<div id="game-status-bar" class="phase-waiting">
  <div id="status-phase">WAIT</div>
  <div id="status-main">
    <div id="status-line1">CONNECTING...</div>
    <div id="status-line2"></div>
  </div>
  <div id="status-dot"></div>
</div>
<div id="status" style="display:none"></div>

<!-- Board Area -->
<div id="board-wrap">
  <div id="board">Loading game...</div>
  <div id="waiting-overlay" style="display: none;">
    <div class="waiting-message">⏳ WAITING FOR OPPONENT...</div>
  </div>
  <div id="gameover-overlay">
    <div id="go-emoji">♟️</div>
    <div id="go-headline">GAME OVER</div>
    <div id="go-sub"></div>
    <div class="go-divider"></div>
    <button id="go-exit-btn" onclick="closeGameOverOverlay()">✕ CLOSE</button>
    <button id="go-new-btn" onclick="newGame()">⟳ NEW GAME</button>
  </div>
</div>

<!-- BOTTOM PLAYER CARD (You / South) -->
<div class="player-card-bottom" id="bottom-player-card">
  <div class="player-avatar" id="bottom-avatar">♔</div>
  <div class="player-info">
    <span class="player-name" id="bottom-name">You</span>
    <span class="player-color-badge">
      <span id="bottom-color">⚪ White</span>
      <span class="player-side-indicator" id="bottom-side-indicator">▼</span>
    </span>
  </div>
</div>

<!-- Captured pieces row -->
<div class="captured-row">
  <div class="captured-strip" id="captured-by-black"></div>
  <div class="captured-strip" id="captured-by-white"></div>
</div>

<!-- Controls -->
<div id="controls">
  <div id="info"></div>
  <button id="draw-btn" onclick="offerDraw()">🤝 DRAW</button>
  <button id="resign-btn" onclick="resignGame()">🏳️ RESIGN</button>
  <button onclick="newGame()">⟳ NEW GAME</button>
</div>

<!-- Modals -->
<div id="stats-modal" class="modal">
  <div class="modal-content">
    <h3 id="modal-player-name">Player Stats</h3>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="stat-games">0</div>
        <div class="stat-label">Games</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-wins">0</div>
        <div class="stat-label">Wins</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-losses">0</div>
        <div class="stat-label">Losses</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-draws">0</div>
        <div class="stat-label">Draws</div>
      </div>
    </div>
    <button class="close-btn" onclick="closeStatsModal()">Close</button>
  </div>
</div>

<div id="promotion-modal" class="modal">
  <div class="modal-content">
    <h3>Promote Pawn</h3>
    <div class="promo-options">
      <div class="promo-piece" data-piece="q">♕</div>
      <div class="promo-piece" data-piece="r">♖</div>
      <div class="promo-piece" data-piece="b">♗</div>
      <div class="promo-piece" data-piece="n">♘</div>
    </div>
    <button class="close-btn" onclick="cancelPromotion()">Cancel</button>
  </div>
</div>

<div id="draw-offer-banner">
  <p>🤝 OPPONENT OFFERS A DRAW</p>
  <div class="draw-banner-btns">
    <button class="draw-accept-btn" onclick="acceptDraw()">✓ ACCEPT</button>
    <button class="draw-decline-btn" onclick="declineDraw()">✗ DECLINE</button>
  </div>
</div>

<button id="chat-fab" onclick="toggleChat()">
  💬
  <span id="chat-badge"></span>
</button>

<div id="chat-panel">
  <div id="chat-panel-header">
    <span>💬 GAME CHAT</span>
    <button id="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div id="chat-messages">
    <div class="chat-msg system">Chat with your opponent...</div>
  </div>
  <div id="chat-input-row">
    <input id="chat-input" type="text" placeholder="Type a message..." maxlength="200" autocomplete="off" />
    <button id="chat-send" onclick="sendChatMessage()">➤</button>
  </div>
</div>

<script>
  // --- Telegram & User Setup ---
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();

  const user = tg.initDataUnsafe?.user;
  let userId = user ? user.id.toString() : null;
  if (!userId) {
    let storedId = localStorage.getItem('chess_anon_id');
    if (!storedId) {
      storedId = 'anon_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
      localStorage.setItem('chess_anon_id', storedId);
    }
    userId = storedId;
  }

  function getUserInfo() {
    if (user) {
      return {
        id: user.id,
        firstName: user.first_name,
        lastName: user.last_name,
        username: user.username,
        photoUrl: user.photo_url || null
      };
    }
    return { id: userId, firstName: 'Anonymous', lastName: '', photoUrl: null };
  }
  const userInfo = getUserInfo();

  const startParam = tg.initDataUnsafe?.start_param;
  const urlParams = new URLSearchParams(window.location.search);
  let gameId = startParam || urlParams.get('game');

  async function ensureGameId() {
    if (!gameId) {
      try {
        const res = await fetch('/api/game/new', { method: 'POST' });
        const data = await res.json();
        gameId = data.gameId;
        const url = new URL(window.location);
        url.searchParams.set('game', gameId);
        window.history.replaceState({}, '', url);
      } catch (e) {
        document.getElementById('board').innerHTML = '<div class="error">Could not create game.</div>';
        throw e;
      }
    }
  }

  // --- State ---
  let myColor = null;
  let selectedSquare = null;
  let possibleMoves = [];
  let boardState = null;
  let lastMove = null;
  let updateInterval = null;
  let waitingForOpponent = true;
  let currentTurn = 'w';
  let gameOver = false;
  let whiteUserId = null, blackUserId = null;

  let whiteTime = 600, blackTime = 600;
  const boardEl = document.getElementById('board');
  const waitingOverlay = document.getElementById('waiting-overlay');

  let pendingPromotion = null;
  let promotionResolve = null;

  // --- Stats Modal ---
  function showStatsModal(uid, playerName) {
    if (!uid) return;
    fetch(`/api/user/${uid}/stats`)
      .then(r => r.json())
      .then(data => {
        document.getElementById('modal-player-name').textContent = playerName;
        document.getElementById('stat-games').textContent = data.stats.gamesPlayed;
        document.getElementById('stat-wins').textContent = data.stats.wins;
        document.getElementById('stat-losses').textContent = data.stats.losses;
        document.getElementById('stat-draws').textContent = data.stats.draws;
        document.getElementById('stats-modal').style.display = 'flex';
      })
      .catch(err => console.error('Stats error:', err));
  }

  window.closeStatsModal = function() {
    document.getElementById('stats-modal').style.display = 'none';
  };

  // Player cards click for stats
  document.getElementById('top-player-card').addEventListener('click', () => {
    const uid = (myColor === 'white') ? blackUserId : whiteUserId;
    if (uid) showStatsModal(uid, document.getElementById('top-name').textContent);
  });
  document.getElementById('bottom-player-card').addEventListener('click', () => {
    const uid = (myColor === 'white') ? whiteUserId : blackUserId;
    if (uid) showStatsModal(uid, document.getElementById('bottom-name').textContent);
  });

  // --- Player Display & Clock Ordering ---
  function updatePlayerDisplays(data) {
    whiteUserId = data.whiteUserId;
    blackUserId = data.blackUserId;

    const white = data.whitePlayer || { firstName: 'White' };
    const black = data.blackPlayer || { firstName: 'Black' };

    document.getElementById('spec-count').textContent = data.spectatorCount || 0;

    const topCard = document.getElementById('top-player-card');
    const bottomCard = document.getElementById('bottom-player-card');
    const topAvatar = document.getElementById('top-avatar');
    const bottomAvatar = document.getElementById('bottom-avatar');
    const topName = document.getElementById('top-name');
    const bottomName = document.getElementById('bottom-name');
    const topColor = document.getElementById('top-color');
    const bottomColor = document.getElementById('bottom-color');
    const topIndicator = document.getElementById('top-side-indicator');
    const bottomIndicator = document.getElementById('bottom-side-indicator');

    const whiteClockWrap = document.getElementById('white-clock-wrap');
    const blackClockWrap = document.getElementById('black-clock-wrap');

    // Reset classes
    topCard.classList.remove('own-side');
    bottomCard.classList.remove('own-side');
    whiteClockWrap.classList.remove('order-top', 'order-bottom');
    blackClockWrap.classList.remove('order-top', 'order-bottom');

    if (myColor === 'white') {
      // White is bottom, Black is top
      topName.textContent = black.firstName || 'Black';
      topColor.textContent = '⚫ Black';
      topAvatar.innerHTML = black.photoUrl ? `<img src="${black.photoUrl}" alt="B">` : (black.firstName?.charAt(0) || 'B');
      topIndicator.textContent = '▲';

      bottomName.textContent = white.firstName || 'White';
      bottomColor.textContent = '⚪ White';
      bottomAvatar.innerHTML = white.photoUrl ? `<img src="${white.photoUrl}" alt="W">` : (white.firstName?.charAt(0) || 'W');
      bottomIndicator.textContent = '▼';
      bottomCard.classList.add('own-side');

      // Clocks: opponent's clock (black) top, your clock (white) bottom
      blackClockWrap.classList.add('order-top');
      whiteClockWrap.classList.add('order-bottom');
    } else if (myColor === 'black') {
      // Black is bottom, White is top
      topName.textContent = white.firstName || 'White';
      topColor.textContent = '⚪ White';
      topAvatar.innerHTML = white.photoUrl ? `<img src="${white.photoUrl}" alt="W">` : (white.firstName?.charAt(0) || 'W');
      topIndicator.textContent = '▲';

      bottomName.textContent = black.firstName || 'Black';
      bottomColor.textContent = '⚫ Black';
      bottomAvatar.innerHTML = black.photoUrl ? `<img src="${black.photoUrl}" alt="B">` : (black.firstName?.charAt(0) || 'B');
      bottomIndicator.textContent = '▼';
      bottomCard.classList.add('own-side');

      // Clocks: opponent's clock (white) top, your clock (black) bottom
      whiteClockWrap.classList.add('order-top');
      blackClockWrap.classList.add('order-bottom');
    } else {
      // Spectator: neutral ordering (white top, black bottom)
      topName.textContent = black.firstName || 'Black';
      topColor.textContent = '⚫ Black';
      topAvatar.innerHTML = black.photoUrl ? `<img src="${black.photoUrl}" alt="B">` : 'B';
      topIndicator.textContent = '';

      bottomName.textContent = white.firstName || 'White';
      bottomColor.textContent = '⚪ White';
      bottomAvatar.innerHTML = white.photoUrl ? `<img src="${white.photoUrl}" alt="W">` : 'W';
      bottomIndicator.textContent = '';

      whiteClockWrap.classList.add('order-top');
      blackClockWrap.classList.add('order-bottom');
    }
  }

  // --- Piece SVG, Move Generation, Clock System (unchanged) ---

</script>
